<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="https://droidnode.ct.ws/system/logo.svg">
  <title>Erreur 403 - Accès Refusé</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;

      /* Image de fond */
      background-image: url('https://droidnode.ct.ws/system/background.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      overflow: hidden;
    }

    /* Overlay sombre + blur */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(8px);
      z-index: -1;
    }

    .code {
      font-size: 120px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }

    .desc {
      font-size: 1.2rem;
      opacity: 0.8;
      margin-top: 10px;
      margin-bottom: 30px;
      text-align: center;
      max-width: 80%;
    }

    /* Style du bouton */
    .btn-back {
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: 600;
      color: white;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .btn-back:hover {
      background: white;
      color: #000;
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }

    /* Cadre DroidNode */
    .version-box {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.4);
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 0.85rem;
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(6px);
    }
  </style>
</head>

<body>

  <div class="code">403</div>
  <div class="desc">Vous n'avez pas l'autorisation d'accéder à cette ressource.</div>

  <button class="btn-back" onclick="history.back()">
        Retourner en arrière
    </button>

  <div class="version-box">DroidNode Web Server v1.0</div>

</body>

</html>
