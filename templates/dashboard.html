<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="utf-8" />
  <title>Bureau – {{ username }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" type="image/svg+xml" href="https://droidnode.ct.ws/system/logo.svg">
  <style>
    :root {
      --tb: 52px;
      --accent: #4f9cff;
      --accent2: #72b2ff;
      --bg-win: rgba(18, 18, 24, 0.72);
      --muted: rgba(255, 255, 255, 0.6);
      --border: rgba(255, 255, 255, 0.12);
      --danger: #ff4d4d;
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
    }

    /* ── BACKGROUND ── */
    .bg {
      position: fixed;
      inset: 0;
      background-image: var(--wp, url('https://images.pexels.com/photos/1103970/pexels-photo-1103970.jpeg'));
      background-size: cover;
      background-position: center;
      z-index: -1;
      filter: brightness(.82) saturate(1.1);
    }

    /* ── TASKBAR ── */
    .taskbar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: var(--tb);
      background: rgba(8, 8, 12, 0.5);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      z-index: 9000;
      display: flex;
      align-items: center;
      padding: 0 14px;
      border-top: 1px solid var(--border);
      gap: 6px;
    }

    .tb-sep {
      width: 1px;
      height: 28px;
      background: var(--border);
      margin: 0 4px;
    }

    /* ── DOCK BUTTON ── */
    .dock-btn {
      position: relative;
      width: 42px;
      height: 42px;
      border-radius: 10px;
      border: none;
      background: transparent;
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .18s, transform .18s;
    }

    .dock-btn:hover {
      background: rgba(255, 255, 255, 0.13);
      transform: translateY(-2px);
    }

    .dock-btn .dot {
      position: absolute;
      bottom: 3px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 3px;
    }

    .dock-btn .dot span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 5px var(--accent);
      display: none;
    }

    /* ── DOCK PREVIEW POPUP ── */
    /* ── DOCK POPUP (global, hors taskbar) ── */
    #dock-popup {
      position: fixed;
      z-index: 9800;
      background: rgba(18, 18, 26, 0.97);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 7px;
      display: none;
      flex-direction: column;
      gap: 4px;
      min-width: 190px;
      max-width: 300px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, .8);
      pointer-events: auto;
    }

    #dock-popup.visible {
      display: flex;
    }

    .dock-preview-title {
      font-size: .68rem;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: rgba(255, 255, 255, .32);
      padding: 3px 8px 5px;
    }

    .dock-preview-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: .84rem;
      color: #ddd;
      transition: background .12s;
      white-space: nowrap;
    }

    .dock-preview-item:hover {
      background: var(--accent);
      color: #fff;
    }

    .dock-preview-item:hover i {
      opacity: 1;
    }

    .dock-preview-item i {
      width: 14px;
      text-align: center;
      font-size: .8rem;
      opacity: .7;
      flex-shrink: 0;
    }

    .dock-preview-empty {
      padding: 6px 10px;
      font-size: .8rem;
      color: rgba(255, 255, 255, .28);
    }

    .dp-label {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dp-badge {
      font-size: .68rem;
      opacity: .42;
      flex-shrink: 0;
      margin-left: 6px;
    }

    /* ── CLOCK / RIGHT ── */
    .tb-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    #clock {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      line-height: 1.1;
    }

    #clock .time {
      font-weight: 600;
      font-size: .92rem;
    }

    #clock .date {
      font-size: .68rem;
      color: var(--muted);
      letter-spacing: .5px;
    }

    /* ── WINDOWS ── */
    .win {
      position: fixed;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--bg-win);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      box-shadow: 0 18px 45px rgba(0, 0, 0, .55), inset 0 1px 0 rgba(255, 255, 255, .08);
      display: none;
      flex-direction: column;
      transition: box-shadow .2s;
    }

    .win.focused {
      box-shadow: 0 22px 55px rgba(0, 0, 0, .7), inset 0 1px 0 rgba(255, 255, 255, .1), 0 0 0 1px rgba(79, 156, 255, .25);
    }

    .win.minimized {
      display: none !important;
    }

    .win.maximized {
      left: 0 !important;
      top: 0 !important;
      width: 100% !important;
      height: calc(100vh - var(--tb)) !important;
      border-radius: 0 !important;
    }

    /* ── TITLEBAR ── */
    .wh {
      height: 44px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      cursor: grab;
      background: rgba(0, 0, 0, 0.22);
      border-bottom: 1px solid rgba(255, 255, 255, .05);
      user-select: none;
      gap: 10px;
    }

    .wh:active {
      cursor: grabbing;
    }

    .wh .wicon {
      font-size: .9rem;
      opacity: .7;
    }

    .wh .wtitle {
      flex: 1;
      font-size: .9rem;
      font-weight: 500;
      letter-spacing: .3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .wh .wctrl {
      display: flex;
      gap: 5px;
      flex-shrink: 0;
    }

    .wctrl button {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, .06);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .72rem;
      transition: .18s;
    }

    .wctrl button:hover {
      background: rgba(255, 255, 255, .18);
      color: #fff;
    }

    .wctrl button.wc-close:hover {
      background: var(--danger);
      box-shadow: 0 0 10px rgba(255, 77, 77, .45);
    }

    .wctrl button.wc-max:hover {
      background: #27ae60;
    }

    .wctrl button.wc-min:hover {
      background: #f39c12;
    }

    /* ── WINDOW BODY ── */
    .wb {
      flex: 1;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px;
    }

    /* ── RESIZE HANDLE ── */
    .resize-handle {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 16px;
      height: 16px;
      cursor: se-resize;
      z-index: 10;
    }

    .resize-handle::after {
      content: '';
      position: absolute;
      right: 3px;
      bottom: 3px;
      width: 8px;
      height: 8px;
      border-right: 2px solid rgba(255, 255, 255, .25);
      border-bottom: 2px solid rgba(255, 255, 255, .25);
      border-radius: 1px;
    }

    /* ── BUTTONS ── */
    .btn {
      padding: 8px 15px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-weight: 500;
      font-size: .88rem;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      transition: .18s;
      box-shadow: 0 4px 12px rgba(79, 156, 255, .28);
    }

    .btn:hover {
      filter: brightness(1.15);
      transform: translateY(-1px);
    }

    .btn.ghost {
      background: rgba(255, 255, 255, .06);
      border: 1px solid var(--border);
      box-shadow: none;
    }

    .btn.ghost:hover {
      background: rgba(255, 255, 255, .14);
    }

    .btn.danger {
      background: #c0392b;
      box-shadow: 0 4px 12px rgba(192, 57, 43, .3);
    }

    .btn.sm {
      padding: 5px 10px;
      font-size: .8rem;
    }

    /* ── INPUTS ── */
    input[type=text],
    input[type=password],
    input[type=search] {
      padding: 9px 13px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, .4);
      color: #fff;
      outline: none;
      width: 100%;
      transition: .18s;
      font-size: .9rem;
    }

    input:focus {
      border-color: var(--accent);
      background: rgba(0, 0, 0, .6);
      box-shadow: 0 0 0 2px rgba(79, 156, 255, .2);
    }

    /* textarea remplacé par Monaco */

    /* ── SIDEBAR ── */
    .sidebar {
      width: 188px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      border-right: 1px solid var(--border);
      padding: 14px;
      background: rgba(0, 0, 0, .28);
    }

    .sidebar h4 {
      font-size: .68rem;
      text-transform: uppercase;
      color: var(--accent);
      letter-spacing: 1px;
      font-weight: 600;
      margin: 10px 0 4px;
    }

    .sidebar .btn.ghost {
      justify-content: flex-start;
      width: 100%;
      border: none;
      padding: 7px 10px;
      font-size: .84rem;
    }

    /* ── FILE CARDS ── */
    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(108px, 1fr));
      gap: 12px;
      overflow-y: auto;
      align-content: start;
    }

    .fc {
      cursor: pointer;
      padding: 13px 8px;
      border-radius: 10px;
      text-align: center;
      transition: all .18s;
      border: 1px solid transparent;
      user-select: none;
    }

    .fc:hover {
      background: rgba(255, 255, 255, .1);
      border-color: rgba(255, 255, 255, .18);
      transform: scale(1.03);
    }

    .fc.selected {
      background: rgba(79, 156, 255, .18);
      border-color: rgba(79, 156, 255, .45);
    }

    .fc.hidden-file {
      opacity: .5;
      font-style: italic;
    }

    .fc i {
      font-size: 2.6rem;
      display: block;
      margin-bottom: 8px;
      transition: transform .18s;
    }

    .fc:hover i {
      transform: scale(1.12);
    }

    .fc .name {
      font-size: .8rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── CONTEXT MENU ── */
    #ctx {
      position: fixed;
      z-index: 10000;
      background: rgba(18, 18, 26, .98);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 12px;
      padding: 5px 0;
      min-width: 218px;
      box-shadow: 0 14px 38px rgba(0, 0, 0, .75);
      display: none;
      overflow: hidden;
    }

    .mi {
      padding: 8px 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 11px;
      color: #ddd;
      font-size: .86rem;
      transition: background .1s;
      white-space: nowrap;
    }

    .mi i {
      width: 14px;
      text-align: center;
      font-size: .82rem;
      opacity: .75;
    }

    .mi:hover {
      background: var(--accent);
      color: #fff;
    }

    .mi:hover i {
      opacity: 1;
    }

    .mi.danger {
      color: #ff6b6b;
    }

    .mi.danger:hover {
      background: #c0392b;
      color: #fff;
    }

    .mi.active {
      color: #4ade80;
    }

    .mi.disabled {
      opacity: .32;
      pointer-events: none;
    }

    .ms {
      height: 1px;
      background: rgba(255, 255, 255, .08);
      margin: 4px 0;
    }

    .ml {
      padding: 5px 15px 3px;
      font-size: .66rem;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: rgba(255, 255, 255, .3);
      font-weight: 600;
    }

    /* ── DETAIL ROWS ── */
    .dr {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, .05);
      padding: 7px 0;
      font-size: .88rem;
      gap: 10px;
    }

    .dl {
      color: var(--muted);
    }

    /* ── EDITOR TABS ── */
    .editor-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      background: rgba(0, 0, 0, .2);
      overflow-x: auto;
      flex-shrink: 0;
    }

    .editor-tabs::-webkit-scrollbar {
      height: 3px;
    }

    .editor-tabs::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .etab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      cursor: pointer;
      border-right: 1px solid var(--border);
      font-size: .82rem;
      white-space: nowrap;
      color: var(--muted);
      transition: .15s;
      max-width: 180px;
    }

    .etab:hover {
      background: rgba(255, 255, 255, .07);
      color: #fff;
    }

    .etab.active {
      background: rgba(0, 0, 0, .35);
      color: #fff;
      border-bottom: 2px solid var(--accent);
    }

    .etab .tname {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .etab .tclose {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: .7rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: .15s;
    }

    .etab .tclose:hover {
      background: rgba(255, 77, 77, .4);
      color: #fff;
    }

    .etab-new {
      padding: 8px 14px;
      cursor: pointer;
      color: var(--muted);
      font-size: 1rem;
      border: none;
      background: transparent;
      transition: .15s;
    }

    .etab-new:hover {
      color: #fff;
    }

    /* ── IMAGE VIEWER ── */
    .img-view-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, .4);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }

    .img-view-wrap img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 4px;
      transition: transform .25s;
    }

    .img-toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 66px;
      right: 18px;
      background: rgba(22, 22, 32, .96);
      backdrop-filter: blur(10px);
      color: #fff;
      padding: 9px 16px;
      border-radius: 10px;
      font-size: .84rem;
      z-index: 99999;
      border: 1px solid var(--border);
      box-shadow: 0 8px 22px rgba(0, 0, 0, .5);
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 4px 0;
    }

    /* ── SVG EDITOR ── */
    .svged-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .svged-toolbar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 7px 10px;
      background: rgba(0, 0, 0, .3);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .svged-toolbar .tbsep {
      width: 1px;
      height: 22px;
      background: var(--border);
      margin: 0 3px;
    }

    .svg-tool-btn {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      border: none;
      background: rgba(255, 255, 255, .06);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .82rem;
      transition: .15s;
      position: relative;
    }

    .svg-tool-btn:hover {
      background: rgba(255, 255, 255, .16);
      color: #fff;
    }

    .svg-tool-btn.active {
      background: rgba(79, 156, 255, .28);
      color: var(--accent);
      border: 1px solid rgba(79, 156, 255, .5);
    }

    .svg-tool-btn[title]:hover::after {
      content: attr(title);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 15, 25, .97);
      color: #fff;
      padding: 3px 8px;
      border-radius: 5px;
      font-size: .7rem;
      white-space: nowrap;
      pointer-events: none;
      z-index: 9999;
    }

    .svged-body {
      flex: 1;
      display: flex;
      min-height: 0;
      overflow: hidden;
    }

    .svged-code {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
    }

    .svged-preview {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: rgba(0, 0, 0, .45);
    }

    .svged-preview-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: rgba(0, 0, 0, .25);
      border-bottom: 1px solid var(--border);
      font-size: .75rem;
      color: var(--muted);
      flex-shrink: 0;
    }

    .svged-canvas-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      padding: 16px;
      position: relative;
    }

    .svged-canvas-wrap svg {
      max-width: 100%;
      max-height: 100%;
    }

    /* Grille de fond pour le canvas */
    .svged-canvas-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(255, 255, 255, .03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, .03) 1px, transparent 1px);
      background-size: 20px 20px;
      pointer-events: none;
    }

    .svged-status {
      padding: 4px 12px;
      font-size: .7rem;
      color: var(--muted);
      background: rgba(0, 0, 0, .2);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      font-family: monospace;
    }

    /* Color picker inline */
    .svged-color-btn {
      width: 22px;
      height: 22px;
      border-radius: 5px;
      border: 2px solid rgba(255, 255, 255, .25);
      cursor: pointer;
      padding: 0;
      background: #4f9cff;
    }

    .svged-color-btn::-webkit-color-swatch-wrapper {
      padding: 0;
    }

    .svged-color-btn::-webkit-color-swatch {
      border: none;
      border-radius: 3px;
    }

    /* Input dimensions */
    .svged-dim-input {
      width: 52px;
      padding: 3px 6px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, .4);
      color: #fff;
      font-size: .75rem;
      text-align: center;
      outline: none;
    }

    .svged-dim-input:focus {
      border-color: var(--accent);
    }

    /* Shapes palette */
    .svged-shapes {
      display: flex;
      flex-direction: column;
      gap: 0;
      border-right: 1px solid var(--border);
      background: rgba(0, 0, 0, .3);
      flex-shrink: 0;
      width: 36px;
    }

    .svged-shape-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .9rem;
      transition: .15s;
      border-bottom: 1px solid rgba(255, 255, 255, .05);
      position: relative;
    }

    .svged-shape-btn:hover {
      background: rgba(255, 255, 255, .1);
      color: #fff;
    }

    .svged-shape-btn.active {
      background: rgba(79, 156, 255, .22);
      color: var(--accent);
    }

    .svged-shape-btn[title]:hover::after {
      content: attr(title);
      position: absolute;
      left: calc(100% + 6px);
      top: 50%;
      transform: translateY(-50%);
      background: rgba(15, 15, 25, .97);
      color: #fff;
      padding: 3px 8px;
      border-radius: 5px;
      font-size: .7rem;
      white-space: nowrap;
      pointer-events: none;
      z-index: 9999;
    }

    /* Panneau propriétés */
    .svged-props {
      width: 180px;
      border-left: 1px solid var(--border);
      background: rgba(0, 0, 0, .28);
      display: flex;
      flex-direction: column;
      gap: 0;
      flex-shrink: 0;
      overflow-y: auto;
    }

    .svged-prop-section {
      padding: 8px 10px;
      border-bottom: 1px solid rgba(255, 255, 255, .06);
    }

    .svged-prop-label {
      font-size: .66rem;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: var(--accent);
      margin-bottom: 6px;
      font-weight: 600;
    }

    .svged-prop-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 5px;
      gap: 6px;
    }

    .svged-prop-row label {
      font-size: .74rem;
      color: var(--muted);
    }

    .svged-prop-input {
      width: 75px;
      padding: 3px 6px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, .4);
      color: #fff;
      font-size: .74rem;
      outline: none;
    }

    .svged-prop-input:focus {
      border-color: var(--accent);
    }

    /* ── DATETIME SETTINGS ── */
    .dt-field-wrap {
      position: relative;
    }

    .dt-field-wrap input[type=date],
    .dt-field-wrap input[type=time] {
      width: 100%;
      padding: 10px 13px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, .4);
      color: #fff;
      outline: none;
      font-size: .9rem;
      transition: .18s;
      color-scheme: dark;
    }

    .dt-field-wrap input:focus {
      border-color: var(--accent);
      background: rgba(0, 0, 0, .6);
    }

    .dt-field-wrap input:disabled {
      opacity: .45;
      background: rgba(0, 0, 0, .2);
      border-color: rgba(255, 255, 255, .07);
    }

    .dt-blocked-overlay {
      position: absolute;
      inset: 0;
      border-radius: 8px;
      z-index: 2;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: rgba(0, 0, 0, .18);
      font-size: .75rem;
      color: rgba(255, 255, 255, .4);
      pointer-events: none;
    }

    .dt-blocked-overlay.visible {
      display: flex;
    }

    .dt-status {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: .8rem;
      padding: 6px 10px;
      border-radius: 8px;
      margin-top: 4px;
    }

    .dt-status.ok {
      background: rgba(60, 185, 110, .15);
      color: #4ade80;
      border: 1px solid rgba(60, 185, 110, .25);
    }

    .dt-status.err {
      background: rgba(200, 70, 70, .15);
      color: #f87171;
      border: 1px solid rgba(200, 70, 70, .25);
    }

    .dt-status.warn {
      background: rgba(220, 160, 40, .12);
      color: #facc15;
      border: 1px solid rgba(220, 160, 40, .22);
    }

    /* ── CURSOR SHOWCASE WINDOW ── */
    .cur-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
      padding: 4px;
    }

    .cur-card {
      background: rgba(0, 0, 0, .28);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 10px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: .18s;
    }

    .cur-card:hover {
      background: rgba(79, 156, 255, .1);
      border-color: rgba(79, 156, 255, .4);
      transform: scale(1.03);
    }

    .cur-card img {
      width: 36px;
      height: 36px;
      object-fit: contain;
      image-rendering: pixelated;
    }

    .cur-card .cn {
      font-size: .72rem;
      color: var(--muted);
      text-align: center;
      font-family: monospace;
      word-break: break-all;
    }

    .cur-card .cc {
      font-size: .68rem;
      color: rgba(255, 255, 255, .3);
      text-align: center;
      font-family: monospace;
    }

    .cur-section-title {
      font-size: .68rem;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--accent);
      font-weight: 600;
      padding: 10px 4px 4px;
      grid-column: 1/-1;
    }

    /* ── DISK WIDGET ── */
    .disk-widget {
      margin-top: auto;
      padding: 10px 12px;
      background: rgba(0, 0, 0, .3);
      border-radius: 10px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: .18s;
      flex-shrink: 0;
    }

    .disk-widget:hover {
      background: rgba(79, 156, 255, .1);
      border-color: rgba(79, 156, 255, .35);
    }

    .disk-widget .dw-title {
      font-size: .67rem;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .disk-widget .dw-bar-wrap {
      height: 5px;
      border-radius: 3px;
      background: rgba(255, 255, 255, .1);
      overflow: hidden;
      margin-bottom: 6px;
    }

    .disk-widget .dw-bar {
      height: 100%;
      border-radius: 3px;
      transition: width .5s;
    }

    .disk-widget .dw-nums {
      display: flex;
      justify-content: space-between;
      font-size: .72rem;
      color: var(--muted);
    }

    /* popup disque */
    #disk-popup-detail {
      position: fixed;
      z-index: 10500;
      background: rgba(18, 18, 28, .98);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      width: 340px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, .8);
      display: none;
    }

    #disk-popup-detail.visible {
      display: block;
    }

    #disk-popup-detail h3 {
      font-size: .92rem;
      font-weight: 500;
      margin: 0 0 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dp-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid rgba(255, 255, 255, .05);
      font-size: .84rem;
    }

    .dp-row:last-child {
      border-bottom: none;
    }

    .dp-row .dp-label {
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .dp-row .dp-val {
      font-weight: 500;
    }

    .dp-bar-big {
      height: 8px;
      border-radius: 4px;
      background: rgba(255, 255, 255, .08);
      overflow: hidden;
      margin: 14px 0 6px;
    }

    .dp-bar-big-fill {
      height: 100%;
      border-radius: 4px;
      transition: width .6s;
    }

    .dp-part {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, .07);
    }

    .dp-part-title {
      font-size: .68rem;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: rgba(255, 255, 255, .3);
      margin-bottom: 8px;
    }


    /* ── UPLOAD MINIMIZED BAR ── */
    #upload-modal.visible {
      display: flex;
    }

    #upload-modal.minimized {
      display: flex !important;
      inset: unset;
      bottom: calc(var(--tb) + 10px);
      right: 16px;
      width: auto;
      height: auto;
      background: transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      align-items: flex-end;
      justify-content: flex-end;
      z-index: 20000;
    }

    #upload-modal.minimized .upload-box {
      width: auto;
      min-width: 220px;
      max-width: 320px;
      padding: 0;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .7);
    }

    #upload-modal.minimized .upload-box>*:not(#upload-minibar) {
      display: none !important;
    }

    #upload-minibar {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      background: rgba(18, 18, 28, .97);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      user-select: none;
      transition: background .15s;
      white-space: nowrap;
    }

    #upload-minibar:hover {
      background: rgba(40, 40, 60, .98);
    }

    #upload-modal.minimized #upload-minibar {
      display: flex;
    }

    .upload-mini-progress {
      flex: 1;
      height: 4px;
      background: rgba(255, 255, 255, .12);
      border-radius: 2px;
      overflow: hidden;
      min-width: 60px;
    }

    .upload-mini-progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width .25s;
      width: 0%;
    }

    .upload-mini-label {
      font-size: .78rem;
      font-weight: 500;
      color: #fff;
      flex-shrink: 0;
    }

    .upload-mini-pct {
      font-size: .72rem;
      color: var(--accent);
      font-family: monospace;
      flex-shrink: 0;
      min-width: 36px;
      text-align: right;
    }

    .upload-mini-expand {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      border: none;
      background: rgba(255, 255, 255, .08);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .65rem;
      flex-shrink: 0;
      transition: .15s;
    }

    .upload-mini-expand:hover {
      background: rgba(255, 255, 255, .2);
      color: #fff;
    }

let zTop = 100;
let clipboard = { path:null, name:null, action:null };
let showHidden = false;

let currentScreen = new URLSearchParams(window.location.search).get('screen') || 'main';

// Windows registry: winId → { el, type, meta, minimized, maximized, prevRect, screen }
const wins = {};

window.addEventListener('storage', (e) => {
  if(e.key==='screen-move' && e.newValue){
    try {
      const payload = JSON.parse(e.newValue);
      if(payload && payload.id && payload.target){
        const w = wins[payload.id];
        if(w){
          setWindowScreen(payload.id, payload.target, false);
          toast(`Fenêtre ${payload.id} déplacée vers écran ${payload.target}`);
        }
      }
    } catch(err){ }
  }
});
let winCounter = 0;

// Editor tabs registry: winId → { tabs:[{id,path,content,dirty}], active:tabId }
const editorState = {};
let tabCounter = 0;

// Image viewer state per window
const viewerState = {};

/* ═══════════════════════════════════════════
   ICONS
═══════════════════════════════════════════ */
const ICON_MAP = {
  folder:       {c:'fa-solid fa-folder',       col:'#4f9cff'},
  folderHidden: {c:'fa-solid fa-folder',       col:'#666'},

  jpg: {c:'fa-solid fa-file-image',col:'#22c55e'},
  jpeg:{c:'fa-solid fa-file-image',col:'#22c55e'},
  gif: {c:'fa-solid fa-file-image',col:'#22c55e'},
  webp:{c:'fa-solid fa-file-image',col:'#22c55e'},

  sql: {c:'fa-solid fa-database', col:'#00758F'},

  bak: {c:'fa-solid fa-clock-rotate-left',col:'#c4c4c4'},
  conf: {c:'fa-solid fa-gear',col:'#c4c4c4'},
  iso: {c:'fa-solid fa-compact-disc', col:'c4c4c4'},
  license: {c:'fa-solid fa-scale-balanced', col:'#A52A2A'},
  copying: {c:'fa-solid fa-copyright', col:'#A52A2A'},
  git: {c:'fa-brands fa-git-alt', col:'#F4511E'},
  lua:{c:'fa-solid fa-file-code', col:'#00007c'},
  help: {c:'fa-solid fa-circle-info', col:'#4f9cff'},
  default:{c:'fa-solid fa-file', col:'#c4c4c4'}
};
const IMG_EXTS = new Set(['png','jpg','jpeg','gif','webp','svg']);

function getIcon(item){
  if(item.is_dir){
    if(item.name.startsWith('.')) return ICON_MAP.folderHidden;
    if(item.name.toLowerCase().includes('system')) return ICON_MAP.folderSystem;
    return ICON_MAP.folder;
  }
  const ext = item.name.toLowerCase().split('.').pop();
  return ICON_MAP[ext]||ICON_MAP.default;
}

function isImage(name){ return IMG_EXTS.has(name.toLowerCase().split('.').pop()); }
const AUDIO_EXTS = new Set(['mp3','ogg','wav','flac','aac','m4a','opus']);
const VIDEO_EXTS = new Set(['mp4','mkv','webm','avi','mov']);
function isAudio(name){ return AUDIO_EXTS.has(name.toLowerCase().split('.').pop()); }
function isVideo(name){ return VIDEO_EXTS.has(name.toLowerCase().split('.').pop()); }
function isMedia(name){ return isAudio(name)||isVideo(name); }

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function fmtSize(b){
  if(b==null) return '—';
  if(b<1024) return b+' o';
  if(b<1048576) return (b/1024).toFixed(1)+' Ko';
  return (b/1048576).toFixed(2)+' Mo';
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.style.opacity='0',2400);
}

function openSecondScreen(){
  if(currentScreen==='second'){
    toast('Vous êtes déjà sur le second bureau');
    return;
  }
  window.open(window.location.pathname+'?screen=second', '_blank');
  toast('Second bureau demandé, Vérifiez un nouvel onglet');
}

function openMainScreen(){
  if(currentScreen==='main'){
    toast('Vous êtes déjà sur le bureau principal');
    return;
  }
  window.open(window.location.pathname+'?screen=main', '_blank');
  toast('Bureau principal demandé, Vérifiez un nouvel onglet');
}

function initScreensSettings(winId){
  const info = document.getElementById('screen-info-'+winId);
  if(info){
    info.textContent = (currentScreen==='main' ? 'Bureau principal' : 'Second bureau');
  }
  refreshScreenSettings(winId);
}

function refreshScreenSettings(winId){
  const container = document.getElementById('screen-window-list-'+winId);
  if(!container) return;
  container.innerHTML = '';

  Object.entries(wins)
    .filter(([,w]) => !['settings','cursor-showcase','file-icons','details'].includes(w.type))
    .forEach(([id,w]) => {
      const row = document.createElement('div');
      row.style.display = 'flex';
      row.style.justifyContent = 'space-between';
      row.style.alignItems = 'center';
      row.style.gap = '8px';
      row.style.padding = '6px 8px';
      row.style.borderBottom = '1px dashed rgba(255,255,255,.12)';

      const label = document.createElement('div');
      label.textContent = `${id} (${w.type}) → ${w.screen || 'main'}`;
      label.style.fontSize = '.75rem';
      label.style.color = 'var(--muted)';

      const btn = document.createElement('button');
      btn.className = 'btn ghost sm';
      btn.textContent = w.screen === 'main' ? 'Vers second' : 'Vers principal';
      btn.onclick = () => {
        const dest = (w.screen === 'main' ? 'second' : 'main');
        setWindowScreen(id, dest);
        refreshScreenSettings(winId);
      };

      row.appendChild(label);
      row.appendChild(btn);
      container.appendChild(row);
    });
}

/* ═══════════════════════════════════════════
   WINDOW FACTORY
═══════════════════════════════════════════ */
function createWin(type, meta={}){
  const id = 'w'+(++winCounter);
  const el = document.createElement('div');
  el.className = 'win';
  el.id = id;
  el.dataset.type = type;
  el.dataset.wid = id;

  // Default sizes
  const sizes = {
    explorer: [900,550], editor:[750,500], viewer:[720,500],
    webdev:[800,500], terminal:[650,400], settings:[500,500], details:[340,420], media:[680,480], 'cursor-showcase':[780,560], svged:[1100,660], 'file-icons':[760,540]
  };
  const [w,h] = sizes[type]||[640,420];
  const ox = 60 + (winCounter%8)*30;
  const oy = 40 + (winCounter%6)*28;
  el.style.cssText = `left:${ox}px;top:${oy}px;width:${w}px;height:${h}px;display:flex;`;

  el.innerHTML = buildWinHTML(id, type, meta);
  document.body.appendChild(el);

  wins[id] = { el, type, meta, minimized:false, maximized:false, prevRect:null, screen: currentScreen };
  setWindowScreen(id, currentScreen, false);

  // Drag
  setupDrag(el);
  // Resize
  setupResize(el);
  // Controls
  el.querySelector('.wc-close').onclick = () => closeWin(id);
  el.querySelector('.wc-min').onclick   = () => minimizeWin(id);
  el.querySelector('.wc-max').onclick   = () => maximizeWin(id);
  // Focus
  el.addEventListener('mousedown', ()=>focusWin(id));

  focusWin(id);
  updateDockDots();
  updatePreviews();
  afterCreate(id, type, meta);
  return id;
}

function buildWinHTML(id, type, meta){
  const icons = {
    explorer:'fa-folder-open', editor:'fa-file-lines', viewer:'fa-image',
    webdev:'fa-code-branch', terminal:'fa-terminal', settings:'fa-gear', details:'fa-circle-info', media:'fa-circle-play', 'cursor-showcase':'fa-arrow-pointer', svged:'fa-pen-nib', 'file-icons':'fa-file'
  };
  const labels = {
    explorer:'Explorateur', editor:'Éditeur de Code', viewer:'Visionneur d\'Images',
    webdev:'Web Dev Hub', terminal:'Terminal', settings:'Paramètres', details:'Propriétés', media:'Lecteur Média', 'cursor-showcase':'Bibliothèque de Curseurs', svged:'Éditeur SVG', 'file-icons':'Icônes de fichiers'
  };
  const icon  = icons[type]  ||'fa-window-maximize';
  const label = meta.title || labels[type] || type;

  const bodyHTML = buildBodyHTML(id, type, meta);

  return `
    <div class="wh" id="wh-${id}">
      <i class="fa-solid ${icon} wicon"></i>
      <span class="wtitle" id="wtitle-${id}">${esc(label)}</span>
      <div class="wctrl">
        <button class="wc-min" title="Réduire"><i class="fa-solid fa-minus"></i></button>
        <button class="wc-max" title="Agrandir"><i class="fa-solid fa-expand"></i></button>

/* ═══════════════════════════════════════════
   WINDOW MANAGEMENT
═══════════════════════════════════════════ */
function setWindowScreen(id,target,broadcast=true){
  const w = wins[id];
  if(!w || !['main','second'].includes(target)) return;
  w.screen = target;
  if(w.el){
    w.el.dataset.screen = target;
    w.el.style.display = (target===currentScreen) ? 'flex' : 'none';
  }
  if(broadcast){
    localStorage.setItem('screen-move', JSON.stringify({id, target, ts: Date.now()}));
  }
  const winSettingsElement = document.getElementById('screen-window-list-'+id);
  if(winSettingsElement) refreshScreenSettings(id);
}

function updateScreenVisibility(){
  Object.values(wins).forEach(w => {
    if(w.el){ w.el.style.display = (w.screen===currentScreen) ? 'flex' : 'none'; }
  });
}

function focusWin(id){
  Object.values(wins).forEach(w=>w.el.classList.remove('focused'));
  zTop++;
  const w = wins[id];
  if(w){ w.el.style.zIndex=zTop; w.el.classList.add('focused'); }
}

function closeWin(id){
  const w=wins[id]; if(!w) return;
  w.el.remove();
  delete wins[id];
  if(monacoInstances[id]){ monacoInstances[id].dispose(); delete monacoInstances[id]; }
  delete editorState[id];
  delete viewerState[id];
  delete mediaState[id];
  delete svgEdState[id];
  updateDockDots();
  updatePreviews();
}

function minimizeWin(id){
  const w=wins[id]; if(!w) return;
  w.minimized = !w.minimized;
  w.el.classList.toggle('minimized', w.minimized);
  updatePreviews();
}

function maximizeWin(id){
  const w=wins[id]; if(!w) return;
  if(!w.maximized){
    const r=w.el.getBoundingClientRect();
    w.prevRect={left:r.left,top:r.top,width:r.width,height:r.height};
    w.maximized=true;
    w.el.classList.add('maximized');
    w.el.querySelector('.wc-max').innerHTML='<i class="fa-solid fa-compress"></i>';
  } else {
    w.maximized=false;
    w.el.classList.remove('maximized');
    if(w.prevRect){
      w.el.style.left  = w.prevRect.left+'px';
      w.el.style.top   = w.prevRect.top+'px';
      w.el.style.width = w.prevRect.width+'px';
      w.el.style.height= w.prevRect.height+'px';
    }
    w.el.querySelector('.wc-max').innerHTML='<i class="fa-solid fa-expand"></i>';
    if(w.type==='editor' && monacoInstances[id]) monacoInstances[id].layout();
  }
}

function openNewWindow(type, meta={}){
  return createWin(type, meta);
}

/* ═══════════════════════════════════════════
   DRAG & RESIZE
═══════════════════════════════════════════ */
function setupDrag(el){
  const header = el.querySelector('.wh');
  header.addEventListener('mousedown', e=>{
    if(e.target.closest('.wctrl')) return;
    const id=el.dataset.wid;
    const w=wins[id];
    if(w && w.maximized) return;
    focusWin(id);
    const rect=el.getBoundingClientRect();
    const dx=e.clientX-rect.left, dy=e.clientY-rect.top;
    let movedAcross = false;

    function tryCrossTab(evt){
      if(movedAcross) return;
      if(currentScreen==='main' && evt.clientX >= window.innerWidth - 8){
        setWindowScreen(id, 'second');
        movedAcross = true;
        toast('Fenêtre envoyée vers le second bureau. Ouvrez le second onglet pour la voir.');
      } else if(currentScreen==='second' && evt.clientX <= 8){
        setWindowScreen(id, 'main');
        movedAcross = true;
        toast('Fenêtre renvoyée vers le bureau principal. Ouvrez le premier onglet.');
      }
    }

    function move(ev){
      el.style.left=(ev.pageX-dx)+'px';
      el.style.top =(ev.pageY-dy)+'px';
      tryCrossTab(ev);
    }
    function up(){ document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',up); }
    document.addEventListener('mousemove',move);
    document.addEventListener('mouseup',up);
  });
}

function setupResize(el){
  const rh = el.querySelector('.resize-handle');
  if(!rh) return;
  rh.addEventListener('mousedown',e=>{
    e.preventDefault(); e.stopPropagation();
    const id=el.dataset.wid, w=wins[id];
    if(w&&w.maximized) return;
    const ox=e.clientX, oy=e.clientY;
    const ow=el.offsetWidth, oh=el.offsetHeight;
    function move(ev){
      el.style.width =Math.max(360,ow+(ev.clientX-ox))+'px';
      el.style.height=Math.max(240,oh+(ev.clientY-oy))+'px';
    }
    function up(){ document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',up); }
    document.addEventListener('mousemove',move);
    document.addEventListener('mouseup',up);
  });
}

/* ═══════════════════════════════════════════
   DOCK DOTS & PREVIEWS
═══════════════════════════════════════════ */
const DOCK_TYPES  = ['explorer','editor','viewer','webdev','terminal','settings','media','svged'];
const DOCK_ICONS  = {explorer:'fa-folder-open',editor:'fa-file-lines',viewer:'fa-image',webdev:'fa-code-branch',terminal:'fa-terminal',settings:'fa-gear',media:'fa-circle-play',svged:'fa-pen-nib'};
const DOCK_LABELS = {explorer:'Explorateur',editor:'Éditeurs',viewer:'Visionneur',webdev:'Web Dev',terminal:'Terminal',settings:'Paramètres',media:'Lecteur Média',svged:'Éditeur SVG'};

const popup = document.getElementById('dock-popup');
let popupType = null;
let popupHideTimer = null;

function updateDockDots(){
  const counts = {};
  Object.values(wins).forEach(w=>{ const t=w.type; counts[t]=(counts[t]||0)+1; });
  DOCK_TYPES.forEach(t=>{
    const dot=document.getElementById('dot-'+t);
    if(!dot) return;
    const n=counts[t]||0;
    dot.innerHTML='';
    for(let i=0;i<Math.min(n,3);i++){
      const s=document.createElement('span'); dot.appendChild(s);
    }
    if(n>0) dot.querySelectorAll('span').forEach(s=>s.style.display='block');
  });
}

function buildPopupContent(type){
  const byType = {};
  Object.entries(wins).forEach(([id,w])=>{ (byType[w.type]||(byType[w.type]=[])).push({id,w}); });
  const list = byType[type]||[];
  popup.innerHTML = '';
  const title = document.createElement('div');
  title.className = 'dock-preview-title';
  title.textContent = DOCK_LABELS[type]||type;
  popup.appendChild(title);
  if(list.length===0){
    const empty = document.createElement('div');
    empty.className = 'dock-preview-empty';
    empty.textContent = 'Aucune fenêtre ouverte';
    popup.appendChild(empty);
  } else {
    list.forEach(({id,w})=>{
      const item = document.createElement('div');
      item.className = 'dock-preview-item';
      const label = getWinLabel(id,w);
      item.innerHTML = `<i class="fa-solid ${DOCK_ICONS[type]||'fa-window-maximize'}"></i><span class="dp-label">${esc(label)}</span>${w.minimized?'<span class="dp-badge">[réduit]</span>':''}`;
      item.onclick = e => {
        e.stopPropagation();
        if(w.minimized){ w.minimized=false; w.el.classList.remove('minimized'); }
        focusWin(id);
        hidePopup(true);
      };
      popup.appendChild(item);
    });
  }
}

function positionPopup(btnEl){
  popup.style.visibility='hidden'; popup.style.display='flex';
  const pw = popup.offsetWidth, ph = popup.offsetHeight;
  popup.style.display=''; popup.style.visibility='';
  const br = btnEl.getBoundingClientRect();
  const tbH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--tb'))||52;
  const margin = 8;
  let x = br.left + br.width/2 - pw/2;
  let y = window.innerHeight - tbH - ph - margin;
  x = Math.max(margin, Math.min(x, window.innerWidth - pw - margin));
  y = Math.max(margin, y);
  popup.style.left = x+'px';
  popup.style.top  = y+'px';
}

function showPopup(type, btnEl){
  clearTimeout(popupHideTimer);
  popupType = type;
  buildPopupContent(type);
  popup.classList.add('visible');
  positionPopup(btnEl);
}

function hidePopup(immediate){
  if(immediate){ popup.classList.remove('visible'); popupType=null; return; }
  popupHideTimer = setTimeout(()=>{ popup.classList.remove('visible'); popupType=null; }, 120);
}

function updatePreviews(){
  if(popup.classList.contains('visible') && popupType){
    const btn = document.getElementById('dock-'+popupType);
    if(btn){ buildPopupContent(popupType); positionPopup(btn); }
  }
}

// Wire hover on dock buttons
DOCK_TYPES.forEach(t=>{
  const btn=document.getElementById('dock-'+t);
  if(!btn) return;
  btn.addEventListener('mouseenter', ()=>showPopup(t, btn));
  btn.addEventListener('mouseleave', ()=>hidePopup());
});
popup.addEventListener('mouseenter', ()=>clearTimeout(popupHideTimer));
popup.addEventListener('mouseleave', ()=>hidePopup());

function getWinLabel(id, w){
  if(w.type==='editor' && editorState[id]){
    const st=editorState[id];
    const tab=st.tabs.find(t=>t.id===st.active);
    if(tab) return tab.path ? tab.path.split('/').pop() : 'Sans titre';
  }
  if(w.type==='viewer' && viewerState[id]){
    return viewerState[id].split('/').pop();
  }
  if(w.type==='media' && mediaState[id]&&mediaState[id].playlist.length){
    const c=mediaState[id];
    return c.playlist[c.current]?c.playlist[c.current].name:'Lecteur Média';
  }
  if(w.type==='explorer') return 'Explorateur – '+currentPath;
  if(w.type==='svged' && svgEdState[id]) return svgEdState[id].filename||'Éditeur SVG';
  return w.meta.title || w.type;
}

async function renderExplorer(path, winId){
  currentPath = path.replace(/\/+/g,'/')||'/';
  const addrEl=document.getElementById('addr-'+winId);
  const grid   =document.getElementById('grid-'+winId);
  if(addrEl) addrEl.value=currentPath;
  if(!grid) return;
  grid.innerHTML='<span style="color:var(--muted)">Chargement…</span>';
  setCursorLoading();
  try{
    const r=await fetch(`/api/list?path=${encodeURIComponent(currentPath)}`);
    const d=await r.json();
    grid.innerHTML='';
    if(d.error){grid.innerHTML=`<span style="color:#ff4d4d">${d.error}</span>`;return;}
    let entries=d.entries||[];
    if(!showHidden) entries=entries.filter(i=>!i.name.startsWith('.'));
    entries.forEach(item=>{
      const div=document.createElement('div');
      div.className='fc'+(item.name.startsWith('.')?' hidden-file':'');
      const ic=getIcon(item);
      div.innerHTML=`<i class="${ic.c}" style="color:${ic.col}"></i><div class="name" title="${esc(item.name)}">${esc(item.name)}</div>`;
      div.ondblclick=()=>{ if(item.is_dir) renderExplorer(item.path,winId); else openFileInApp(item,winId); };
      div.onclick=()=>{grid.querySelectorAll('.fc').forEach(c=>c.classList.remove('selected'));div.classList.add('selected');};
      div.oncontextmenu=e=>{grid.querySelectorAll('.fc').forEach(c=>c.classList.remove('selected'));div.classList.add('selected');showCtx(e,false,item,winId);};
      grid.appendChild(div);
    });
  }catch(e){grid.innerHTML='<span style="color:#ff4d4d">Erreur de connexion.</span>';}
  finally{ clearCursorLoading(); }
  updatePreviews();
}

function openFileInApp(item, srcWinId){
  if(item.name.toLowerCase().endsWith('.svg')&&!item.is_dir){ openInSvgEditor(item.path); return; }
  if(isImage(item.name)){
    openNewWindow('viewer',{path:item.path});
  } else if(isMedia(item.name)){
    openInMediaPlayer(item.path);
  } else {
    openInEditor(item.path);
  }
}

function goUp(winId){
  if(currentPath==='/') return;
  let parts=currentPath.split('/').filter(p=>p);
  parts.pop();
  renderExplorer('/'+parts.join('/'),winId);
}

async function manualCreate(isFolder, winId){
  const name=prompt(isFolder?"Nom du dossier :":"Nom du fichier :");
  if(!name) return;
  const path=currentPath==='/'?`/${name}`:`${currentPath}/${name}`;
  const r=await fetch('/api/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path,is_dir:isFolder})});
  const res=await r.json();
  if(res.ok) renderExplorer(currentPath,winId);
}

async function deleteItem(path, winId){
  if(!confirm(`Supprimer « ${path} » ?`)) return;
  setCursorLoading();
  try{
    const r=await fetch('/api/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path})});
    const res=await r.json();
    if(res.ok) renderExplorer(currentPath,winId);
    else alert("Erreur: "+res.error);
  } finally{ clearCursorLoading(); }
}

async function renameItem(item, winId){
  const newName=prompt("Nouveau nom :",item.name);
  if(!newName||newName===item.name) return;
  const parent=item.path.substring(0,item.path.lastIndexOf('/'))||'/';
  const newPath=(parent==='/'?'':parent)+'/'+newName;
  setCursorLoading();
  try{
    const r=await fetch('/api/rename',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({old_path:item.path,new_path:newPath})});
    const res=await r.json();
    if(res.ok) renderExplorer(currentPath,winId);
    else alert("Erreur de renommage: "+(res.error||'?'));
  } finally{ clearCursorLoading(); }
}

function copyItem(item){clipboard={path:item.path,name:item.name,action:'copy'};toast(`Copié : ${item.name}`);}
function cutItem(item) {clipboard={path:item.path,name:item.name,action:'cut'};toast(`Coupé : ${item.name}`);}

async function pasteItem(winId){
  if(!clipboard.path) return;
  const dest=(currentPath==='/'?'':currentPath)+'/'+clipboard.name;
  setCursorLoading();
  try{
    if(clipboard.action==='copy'){
      const r=await fetch('/api/copy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({src:clipboard.path,dest})});
      const res=await r.json();
      if(res.ok){renderExplorer(currentPath,winId);toast('Collé (copie).');}
      else alert("Erreur: "+(res.error||'?'));
    } else {
      const r=await fetch('/api/rename',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({old_path:clipboard.path,new_path:dest})});
      const res=await r.json();
      if(res.ok){clipboard={path:null,name:null,action:null};renderExplorer(currentPath,winId);toast('Déplacé.');}
      else alert("Erreur: "+(res.error||'?'));
    }
  } finally{ clearCursorLoading(); }
}

function downloadItem(path){
  const a=document.createElement('a');
  a.href=`/api/download?path=${encodeURIComponent(path)}`;
  a.download=path.split('/').pop();
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

function triggerFileUpload(winId, isFolder){
  const inp = document.createElement('input');
  inp.type = 'file'; inp.multiple = true;
  if(isFolder){ inp.webkitdirectory = true; inp.directory = true; }
  inp.onchange = ()=> openUploadModal(inp.files, winId);
  inp.click();
}

/* ═══════════════════════════════════════════
   CURSOR LOADING STATE
═══════════════════════════════════════════ */
let _cursorLoadCount = 0;
function setCursorLoading(){
  _cursorLoadCount++;
  document.body.classList.add('loading');
}
function clearCursorLoading(){
  _cursorLoadCount = Math.max(0, _cursorLoadCount - 1);
  if(_cursorLoadCount === 0) document.body.classList.remove('loading');
}

/* ═══════════════════════════════════════════
   UPLOAD MODAL
═══════════════════════════════════════════ */
let uploadQueue = [];   // [{file, path, status:'pending'|'uploading'|'done'|'error'}]
let uploadWinId = null;
let uploadMinimized = false;
let uploadGlobalProgress = 0; // 0-100

function openUploadModal(files, winId){
  uploadWinId = winId;
  uploadQueue = [];
  uploadMinimized = false;
  uploadGlobalProgress = 0;
  document.getElementById('upload-list').innerHTML = '';
  const sumEl = document.getElementById('upload-summary');
  if(sumEl) sumEl.textContent = '';
  document.getElementById('upload-start-btn').style.display = 'none';
  const modal = document.getElementById('upload-modal');
  modal.classList.remove('minimized');
  modal.classList.add('visible');
  updateUploadMinibar();

  if(files && files.length > 0) addFilesToQueue(files);
}

function closeUploadModal(){
  const modal = document.getElementById('upload-modal');
  modal.classList.remove('visible');
  modal.classList.remove('minimized');
  uploadMinimized = false;
}

function minimizeUploadModal(){
  const modal = document.getElementById('upload-modal');
  modal.classList.remove('visible');
  modal.classList.add('minimized');
  uploadMinimized = true;
  updateUploadMinibar();
}

function restoreUploadModal(){
  const modal = document.getElementById('upload-modal');
  modal.classList.remove('minimized');
  modal.classList.add('visible');
  uploadMinimized = false;
}

function updateUploadMinibar(){
  const total    = uploadQueue.length;
  const done     = uploadQueue.filter(i=>i.status==='done').length;
  const err      = uploadQueue.filter(i=>i.status==='error').length;
  const uploading= uploadQueue.filter(i=>i.status==='uploading').length;

  // Pourcentage global (fichiers terminés + contribution en cours)
  const pct = total === 0 ? 0 : Math.round((done / total) * 100);
  uploadGlobalProgress = pct;

  const label = document.getElementById('upload-mini-label');
  const fill  = document.getElementById('upload-mini-fill');
  const pctEl = document.getElementById('upload-mini-pct');

  if(label){
    if(uploading > 0)       label.textContent = `Importation…`;
    else if(done === total && total > 0) label.textContent = `Terminé`;
    else if(err > 0)        label.textContent = `${err} erreur(s)`;
    else                    label.textContent = `Importation`;
  }
  if(fill)  fill.style.width = pct + '%';
  if(pctEl) pctEl.textContent = pct + '%';
}

function addFilesToQueue(files){
  Array.from(files).forEach(file => {
    // Reconstituer le chemin relatif pour l'import dossier
    const relPath = file.webkitRelativePath || file.name;
    const destPath = currentPath === '/' ? '/' + relPath : currentPath + '/' + relPath;
    const item = { file, path: destPath, status: 'pending' };
    uploadQueue.push(item);
    renderUploadItem(item, uploadQueue.length - 1);
  });
  document.getElementById('upload-start-btn').style.display = uploadQueue.length ? 'inline-flex' : 'none';
  updateUploadSummary();
}

function renderUploadItem(item, idx){
  const list = document.getElementById('upload-list');
  const div = document.createElement('div');
  div.className = 'upload-item';
  div.id = 'uitem-' + idx;
  div.innerHTML = `
    <i class="fa-solid fa-file" style="color:var(--muted);font-size:.9rem;flex-shrink:0;"></i>
    <div style="flex:1;min-width:0;">
      <div class="ui-name" title="${esc(item.path)}">${esc(item.file.name)}</div>
      <div class="upload-bar-wrap"><div class="upload-bar" id="ubar-${idx}"></div></div>
    </div>
    <span class="ui-size">${fmtSize(item.file.size)}</span>
    <span class="ui-status" id="ustatus-${idx}"><i class="fa-solid fa-clock" style="opacity:.4;"></i></span>
  `;
  list.appendChild(div);
}

function updateUploadSummary(){
  const total = uploadQueue.length;
  const done  = uploadQueue.filter(i=>i.status==='done').length;
  const err   = uploadQueue.filter(i=>i.status==='error').length;
  const el    = document.getElementById('upload-summary');
  if(el){
    if(total === 0){ el.textContent=''; }
    else { el.textContent = `${total} fichier(s) — ${done} terminé(s)${err?', '+err+' erreur(s)':''}`; }
  }
  updateUploadMinibar();
}

async function startUpload(){
  const btn = document.getElementById('upload-start-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Envoi…';

  for(let i = 0; i < uploadQueue.length; i++){
    const item = uploadQueue[i];
    if(item.status === 'done') continue;
    item.status = 'uploading';
    setUploadItemStatus(i, 'uploading');

    try {
      await uploadFile(item.file, item.path, i);
      item.status = 'done';
      setUploadItemStatus(i, 'done');
    } catch(e) {
      item.status = 'error';
      setUploadItemStatus(i, 'error', e.message||'Erreur');
    }
    updateUploadSummary();
  }

  btn.disabled = false;
  btn.innerHTML = '<i class="fa-solid fa-check"></i> Terminé';

  // Rafraîchir l'explorateur
  const allDone = uploadQueue.every(i=>i.status==='done');
  if(allDone && uploadWinId) renderExplorer(currentPath, uploadWinId);

  updateUploadMinibar();
  toast(allDone ? `${uploadQueue.length} fichier(s) importé(s) !` : 'Import terminé avec des erreurs.');
  // Si minimisé, laisser la mini-barre visible 3s puis fermer automatiquement
  if(uploadMinimized && allDone){
    setTimeout(()=>{ if(uploadMinimized) closeUploadModal(); }, 3000);
  }
}

function uploadFile(file, destPath, idx){
  return new Promise((resolve, reject) => {
    const fd = new FormData();
    fd.append('file', file);
    fd.append('path', destPath);

    const xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/upload');

    xhr.upload.onprogress = e => {
      if(e.lengthComputable){
        const pct = (e.loaded / e.total * 100).toFixed(1);
        const bar = document.getElementById('ubar-' + idx);
        if(bar) bar.style.width = pct + '%';
        // Mise à jour mini-barre (progression partielle du fichier courant)
        const done = uploadQueue.filter(i=>i.status==='done').length;
        const total = uploadQueue.length;
        const globalPct = total === 0 ? 0 : Math.round(((done + e.loaded/e.total) / total) * 100);
        const fill  = document.getElementById('upload-mini-fill');
        const pctEl = document.getElementById('upload-mini-pct');
        const lbl   = document.getElementById('upload-mini-label');
        if(fill)  fill.style.width = globalPct + '%';
        if(pctEl) pctEl.textContent = globalPct + '%';
        if(lbl)   lbl.textContent = 'Importation…';
      }
    };

    xhr.onload = () => {
      const bar = document.getElementById('ubar-' + idx);
      if(bar) bar.style.width = '100%';
      if(xhr.status === 200) resolve();
      else {
        try { reject(new Error(JSON.parse(xhr.responseText).error || 'Erreur serveur')); }
        catch { reject(new Error('Erreur ' + xhr.status)); }
      }
    };

    xhr.onerror = () => reject(new Error('Connexion impossible'));
    xhr.send(fd);
  });
}

function setUploadItemStatus(idx, status, msg=''){
  const el = document.getElementById('ustatus-' + idx);
  if(!el) return;
  const icons = {
    uploading: '<i class="fa-solid fa-spinner fa-spin" style="color:var(--accent);"></i>',
    done:      '<i class="fa-solid fa-check" style="color:#4ade80;"></i>',
    error:     `<i class="fa-solid fa-xmark" style="color:#f87171;" title="${esc(msg)}"></i>`
  };
  el.innerHTML = icons[status] || '';
  if(status === 'error'){
    const bar = document.getElementById('ubar-' + idx);
    if(bar){ bar.style.background='#f87171'; bar.style.width='100%'; }
  }
}

/* ═══════════════════════════════════════════
   MONACO EDITOR
═══════════════════════════════════════════ */

// Monaco est chargé une seule fois via require, instances par fenêtre
const monacoInstances = {}; // winId → monaco editor instance
// Détecter le langage Monaco selon l'extension
function detectLang(path){
  if(!path) return 'plaintext';
  const ext = path.toLowerCase().split('.').pop();
  const map = {
    js:'javascript', ts:'typescript', jsx:'javascript', tsx:'typescript',
    py:'python', html:'html', htm:'html', css:'css', scss:'scss', less:'less',
    json:'json', md:'markdown', sh:'shell', bash:'shell', yaml:'yaml', yml:'yaml',
    xml:'xml', sql:'sql', php:'php', rb:'ruby', rs:'rust', go:'go',
    c:'c', cpp:'cpp', h:'cpp', cs:'csharp', java:'java', kt:'kotlin',
    swift:'swift', dart:'dart', lua:'lua', r:'r', tex:'latex',
    ini:'ini', toml:'ini', conf:'ini', txt:'plaintext',
  };
  return map[ext] || 'plaintext';
}

function initEditor(winId, meta={}){
  editorState[winId] = { tabs:[], active:null };
  // Monaco s'initialise après que le DOM soit inséré (dans afterCreate → initEditor)
  // On utilise require (déjà chargé via le loader Monaco CDN)
  require(['vs/editor/editor.main'], function(monaco){
    const container = document.getElementById('monaco-'+winId);
    if(!container) return;

    const editor = monaco.editor.create(container, {
      value: '',
      language: 'plaintext',
      theme: 'vs-dark',
      automaticLayout: true,        // Redimensionnement auto avec la fenêtre
      fontSize: 14,
      fontFamily: "'Fira Code', 'Cascadia Code', 'Courier New', monospace",
      fontLigatures: true,
      minimap: { enabled: true, scale: 1 },
      scrollBeyondLastLine: false,
      wordWrap: 'off',
      lineNumbers: 'on',
      renderWhitespace: 'selection',
      tabSize: 2,
      insertSpaces: true,
      formatOnPaste: true,
      bracketPairColorization: { enabled: true },
      cursorBlinking: 'smooth',
      cursorSmoothCaretAnimation: 'on',
      smoothScrolling: true,
      padding: { top: 10, bottom: 10 },
    });

    monacoInstances[winId] = editor;

    // Marquer dirty sur changement
    editor.onDidChangeModelContent(()=>{
      const st = editorState[winId]; if(!st) return;
      const tab = st.tabs.find(t=>t.id===st.active); if(!tab) return;
      if(!tab.dirty){ tab.dirty=true; rebuildEditorTabs(winId); }
    });

    // Ctrl+S → sauvegarder
    editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, ()=>{
      saveActiveTab(winId);
    });

    // Charger le fichier initial si meta.path
    const tab = newEditorTab(winId);
    if(meta.path) loadFileIntoTab(winId, tab, meta.path);
  });
}

function newEditorTab(winId){
  const st=editorState[winId]; if(!st) return;
  const tabId='t'+(++tabCounter);
  st.tabs.push({id:tabId, path:null, content:'', dirty:false, lang:'plaintext'});
  st.active=tabId;
  rebuildEditorTabs(winId);
  updateEditorView(winId);
  return tabId;
}

function rebuildEditorTabs(winId){
  const st=editorState[winId]; if(!st) return;
  const container=document.getElementById('etabs-'+winId); if(!container) return;
  const btn=container.querySelector('.etab-new');
  container.innerHTML='';

  st.tabs.forEach(tab=>{
    const div=document.createElement('div');
    div.className='etab'+(tab.id===st.active?' active':'');
    const name = tab.path ? tab.path.split('/').pop() : 'Sans titre';
    const label = name + (tab.dirty ? ' ●' : '');
    div.innerHTML=`<span class="tname" title="${esc(tab.path||'Sans titre')}">${esc(label)}</span><button class="tclose" title="Fermer"><i class="fa-solid fa-xmark"></i></button>`;
    div.onclick=(e)=>{
      if(!e.target.closest('.tclose')){
        st.active=tab.id;
        rebuildEditorTabs(winId);
        updateEditorView(winId);
      }
    };
    div.querySelector('.tclose').onclick=(e)=>{e.stopPropagation(); closeEditorTab(winId,tab.id);};
    container.appendChild(div);
  });

  if(btn) container.appendChild(btn);
  updatePreviews();
}

function closeEditorTab(winId, tabId){
  const st=editorState[winId]; if(!st) return;
  const tab=st.tabs.find(t=>t.id===tabId);
  if(tab && tab.dirty && !confirm('Fermer sans enregistrer ?')) return;
  st.tabs=st.tabs.filter(t=>t.id!==tabId);
  if(st.active===tabId) st.active=st.tabs.length?st.tabs[st.tabs.length-1].id:null;
  if(st.tabs.length===0) newEditorTab(winId);
  else { rebuildEditorTabs(winId); updateEditorView(winId); }
}

function updateEditorView(winId){
  const st=editorState[winId]; if(!st) return;
  const tab=st.tabs.find(t=>t.id===st.active);
  const fnEl=document.getElementById('efilename-'+winId);
  if(fnEl && tab) fnEl.textContent = tab.path || 'Sans titre';

  const editor = monacoInstances[winId];
  if(!editor || !tab) { updatePreviews(); return; }

  // Changer le modèle Monaco avec la bonne langue
  const lang = tab.lang || detectLang(tab.path);
  const model = monaco.editor.createModel(tab.content||'', lang);
  editor.setModel(model);

  updatePreviews();
}

async function loadFileIntoTab(winId, tabId, path){
  setCursorLoading();
  try{
    const r = await fetch(`/api/read?path=${encodeURIComponent(path)}`);
    const d = await r.json();
    if(d.error){ alert(d.error); return; }
    const st=editorState[winId]; if(!st) return;
    const tab=st.tabs.find(t=>t.id===tabId); if(!tab) return;
    tab.path=path; tab.content=d.content||''; tab.dirty=false;
    tab.lang=detectLang(path); st.active=tabId;
    rebuildEditorTabs(winId);
    updateEditorView(winId);
  } finally { clearCursorLoading(); }
}

async function saveActiveTab(winId){
  const st=editorState[winId]; if(!st) return;
  const tab=st.tabs.find(t=>t.id===st.active); if(!tab) return;
  const editor=monacoInstances[winId];
  if(editor) tab.content=editor.getValue();
  if(!tab.path){
    const name=prompt("Nom du fichier :");
    if(!name) return;
    tab.path=currentPath==='/'?`/${name}`:`${currentPath}/${name}`;
    tab.lang=detectLang(tab.path);
    if(editor){ const model=monaco.editor.createModel(tab.content,tab.lang); editor.setModel(model); }
  }
  setCursorLoading();
  try{
    const r=await fetch('/api/write',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:tab.path,content:tab.content})});
    const res=await r.json();
    if(res.ok){
      tab.dirty=false; rebuildEditorTabs(winId);
      const fnEl=document.getElementById('efilename-'+winId);
      if(fnEl) fnEl.textContent=tab.path;
      toast('Fichier sauvegardé !');
    } else { alert("Erreur : "+res.error); }
  } finally { clearCursorLoading(); }
}


function monacoFormat(winId){
  const editor = monacoInstances[winId]; if(!editor) return;
  editor.getAction('editor.action.formatDocument').run();
}

function openInEditor(path){
  const existing = Object.entries(wins).find(([id,w])=>w.type==='editor');
  if(existing){
    const [winId,w] = existing;
    if(w.minimized){ w.minimized=false; w.el.classList.remove('minimized'); }
    focusWin(winId);
    const st = editorState[winId];
    const existing_tab = st.tabs.find(t=>t.path===path);
    if(existing_tab){
      st.active = existing_tab.id;
      rebuildEditorTabs(winId);
      updateEditorView(winId);
      return;
    }
    const tid = newEditorTab(winId);
    loadFileIntoTab(winId, tid, path);
  } else {
    openNewWindow('editor', {path});
  }
}

function applyViewerTransform(img){
  img.style.transform=`scale(${img._scale||1}) rotate(${img._rot||0}deg)`;
}

function initTerminal(winId){
  const input=document.getElementById('tin-'+winId);
  if(!input) return;
  const hist=[]; let hIdx=-1;
  input.addEventListener('keydown', async e=>{
    if(e.key==='ArrowUp'){if(hIdx<hist.length-1){hIdx++;input.value=hist[hIdx];}return;}
    if(e.key==='ArrowDown'){if(hIdx>0){hIdx--;input.value=hist[hIdx];}else{hIdx=-1;input.value='';}return;}
    if(e.key!=='Enter') return;
    const cmd=input.value.trim(); if(!cmd) return;
    hist.unshift(cmd); hIdx=-1;
    input.value='';
    const out=document.getElementById('tout-'+winId);
    out.textContent+=`$ ${cmd}\n`;
    setCursorLoading();
    try{
      const r=await fetch('/api/exec',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cmd})});
      const d=await r.json();
      out.textContent+=(d.output||d.error||'(pas de sortie)')+'\n';
    }catch(err){out.textContent+='Erreur de connexion.\n';} finally{ clearCursorLoading(); }
    out.scrollTop=out.scrollHeight;
  });
}

// Remplir les champs avec la date/heure actuelle
function dtSetNow(winId){
  const now = new Date();
  const dateEl = document.getElementById('dt-date-'+winId);
  const timeEl = document.getElementById('dt-time-'+winId);
  if(dateEl && !dateEl.disabled)
    dateEl.value = now.toISOString().slice(0,10);
  if(timeEl && !timeEl.disabled){
    const hh = String(now.getHours()).padStart(2,'0');
    const mm = String(now.getMinutes()).padStart(2,'0');
    const ss = String(now.getSeconds()).padStart(2,'0');
    timeEl.value = `${hh}:${mm}:${ss}`;
  }
}

// Initialisation des champs lors de l'ouverture des settings
function initDatetimeSettings(winId){
  dtSetNow(winId);
  // Tester si la modification est autorisée par un essai à blanc
  dtTestPermission(winId);
}

async function dtTestPermission(winId){
  const status = document.getElementById('dt-status-'+winId);
  const applyBtn = document.getElementById('dt-apply-'+winId);
  const dateEl = document.getElementById('dt-date-'+winId);
  const timeEl = document.getElementById('dt-time-'+winId);
  const overlayDate = document.getElementById('dt-overlay-date-'+winId);
  const overlayTime = document.getElementById('dt-overlay-time-'+winId);
  if(!status) return;

  status.innerHTML = `<div class="dt-status warn"><i class="fa-solid fa-spinner fa-spin"></i> Vérification des permissions…</div>`;

  try {
    // On envoie la date/heure actuelle comme test (sans changer réellement)
    const now = new Date();
    const testDate = now.toISOString().slice(0,10);
    const hh = String(now.getHours()).padStart(2,'0');
    const mm = String(now.getMinutes()).padStart(2,'0');
    const ss = String(now.getSeconds()).padStart(2,'0');
    const testTime = `${hh}:${mm}:${ss}`;

    const r = await fetch('/api/system/set-time', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({date: testDate, time: testTime})
    });
    const d = await r.json();

    if(r.status === 403 || (d && d.ok === false)){
      // Bloqué par Android
      dtSetBlocked(winId, dateEl, timeEl, overlayDate, overlayTime, applyBtn, status,
        d.error || 'Root requis pour modifier l\'heure système (Android bloque cette opération).');
    } else {
      // Autorisé
      dtSetAllowed(dateEl, timeEl, overlayDate, overlayTime, applyBtn, status);
    }
  } catch(e) {
    status.innerHTML = `<div class="dt-status err"><i class="fa-solid fa-circle-exclamation"></i> Erreur de connexion au serveur.</div>`;
  }
}

function dtSetBlocked(winId, dateEl, timeEl, overlayDate, overlayTime, applyBtn, status, msg){
  // Désactiver les champs
  if(dateEl){ dateEl.disabled = true; }
  if(timeEl){ timeEl.disabled = true; }

  // Appliquer le curseur "not-allowed" sur les overlays visibles
  const notAllowedCur = getCursorStyleForName('not-allowed');
  [dateEl, timeEl].forEach(el => {
    if(el) el.style.cursor = notAllowedCur;
  });

  // Afficher les overlays
  if(overlayDate){ overlayDate.classList.add('visible'); overlayDate.style.cursor = notAllowedCur; }
  if(overlayTime){ overlayTime.classList.add('visible'); overlayTime.style.cursor = notAllowedCur; }

  // Désactiver le bouton appliquer
  if(applyBtn){
    applyBtn.disabled = true;
    applyBtn.style.opacity = '.4';
    applyBtn.style.cursor = notAllowedCur;
  }

  if(status) status.innerHTML = `<div class="dt-status err">
    <i class="fa-solid fa-lock"></i>
    <span>${esc(msg)}</span>
  </div>`;
}

function dtSetAllowed(dateEl, timeEl, overlayDate, overlayTime, applyBtn, status){
  if(dateEl){ dateEl.disabled = false; dateEl.style.cursor = ''; }
  if(timeEl){ timeEl.disabled = false; timeEl.style.cursor = ''; }
  if(overlayDate) overlayDate.classList.remove('visible');
  if(overlayTime) overlayTime.classList.remove('visible');
  if(applyBtn){ applyBtn.disabled = false; applyBtn.style.opacity = ''; applyBtn.style.cursor = ''; }
  if(status) status.innerHTML = `<div class="dt-status ok">
    <i class="fa-solid fa-circle-check"></i>
    <span>Modification de l'heure autorisée.</span>
  </div>`;
}

// Lire le curseur CSS d'un curseur nommé depuis les stylesheets
function getCursorStyleForName(name){
  for(const sheet of document.styleSheets){
    try{
      for(const rule of sheet.cssRules){
        if(rule.selectorText === `.cur-${name}`){
          return rule.style.cursor;
        }
      }
    }catch(e){}
  }
  return 'not-allowed'; // fallback CSS natif
}

async function dtApply(winId){
  const dateEl = document.getElementById('dt-date-'+winId);
  const timeEl = document.getElementById('dt-time-'+winId);
  const status = document.getElementById('dt-status-'+winId);
  if(!dateEl||!timeEl||!status) return;

  const date = dateEl.value;
  const time = timeEl.value || '00:00:00';
  if(!date){ toast('Veuillez saisir une date valide.'); return; }

  status.innerHTML = `<div class="dt-status warn"><i class="fa-solid fa-spinner fa-spin"></i> Application en cours…</div>`;
  setCursorLoading();
  try{
    const r = await fetch('/api/system/set-time',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({date, time})
    });
    const d = await r.json();

    if(r.status === 403 || d.ok === false){
      const applyBtn  = document.getElementById('dt-apply-'+winId);
      const overlayD  = document.getElementById('dt-overlay-date-'+winId);
      const overlayT  = document.getElementById('dt-overlay-time-'+winId);
      dtSetBlocked(winId, dateEl, timeEl, overlayD, overlayT, applyBtn, status,
        d.error || 'Opération refusée par Android.');
    } else {
      status.innerHTML = `<div class="dt-status ok"><i class="fa-solid fa-circle-check"></i> Date et heure mises à jour !</div>`;
      toast('Heure système mise à jour !');
      // Resynchroniser l'horloge du bureau
      const now = new Date(date + 'T' + (timeEl.value||'00:00:00'));
      const clockEl = document.querySelector('#clock .time');
      if(clockEl){
        // Mettre à jour le compteur interne de l'horloge
        const evt = new CustomEvent('dt-sync', {detail:{timestamp: now.getTime()}});
        document.dispatchEvent(evt);
      }
    }
  } catch(e){
    status.innerHTML = `<div class="dt-status err"><i class="fa-solid fa-circle-exclamation"></i> Erreur : ${esc(String(e))}</div>`;
  } finally{ clearCursorLoading(); }
}

// Extraire les data-URI des CSS déjà injectés dans la page
function getCursorDataURI(cssName){
  // On lit la règle .cur-{name} du stylesheet
  for(const sheet of document.styleSheets){
    try {
      for(const rule of sheet.cssRules){
        if(rule.selectorText === `.cur-${cssName}`){
          const m = rule.style.cursor.match(/url\("([^"]+)"\)/);
          if(m) return m[1];
        }
      }
    } catch(e){}
  }
  return null;
}

function afterCreateFileIcons(winId){
  const grid = document.getElementById('icon-grid-'+winId);
  const preview = document.getElementById('icon-preview-'+winId);
  if(!grid) return;

  const entries = Object.entries(ICON_MAP).sort((a,b)=>a[0].localeCompare(b[0]));
  entries.forEach(([key,val]) => {
    const card = document.createElement('div');
    card.className = 'cur-card';

    const iconHtml = val.c
      ? `<i class="${val.c} fa-2x" style="color:${val.col || '#fff'};"></i>`
      : `<i class="fa-solid fa-file fa-2x" style="color:#fff"></i>`;

    card.innerHTML = `
      ${iconHtml}
      <div class="cn">${key}</div>
      <div class="cc">${val.c || 'fa-file'}</div>
    `;

    card.addEventListener('mouseenter', ()=>{ if(preview) preview.textContent = key; });
    card.addEventListener('mouseleave', ()=>{ if(preview) preview.textContent = '—'; });
    card.addEventListener('click', ()=>{
      navigator.clipboard.writeText(key).catch(()=>{});
      toast(`Clé copiée : ${key}`);
    });

    grid.appendChild(card);
  });
}

function afterCreateCursorShowcase(winId){
  const grid = document.getElementById('curgrid-'+winId);
  if(!grid) return;
  const preview = document.getElementById('cur-preview-'+winId);

  CURSOR_CATALOG.forEach(item => {
    if(item.section){
      const t = document.createElement('div');
      t.className = 'cur-section-title';
      t.textContent = item.section;
      grid.appendChild(t);
      return;
    }

    const dataURI = getCursorDataURI(item.name);
    const card = document.createElement('div');
    card.className = 'cur-card';

    // Appliquer le curseur custom au survol de la carte
    card.addEventListener('mouseenter', ()=>{
      card.style.cursor = `url("${dataURI}") 5 2, ${item.css}`;
      if(preview) preview.textContent = `.cur-${item.name}`;
    });
    card.addEventListener('mouseleave', ()=>{
      card.style.cursor = '';
      if(preview) preview.textContent = '—';
    });
    card.addEventListener('click', ()=>{
      navigator.clipboard.writeText(`cur-${item.name}`).catch(()=>{});
      toast(`Classe copiée : cur-${item.name}`);
    });

    card.innerHTML = `
      ${dataURI ? `<img src="${dataURI}" alt="${item.name}" draggable="false">` : `<i class="fa-solid fa-arrow-pointer" style="font-size:2rem;opacity:.3;"></i>`}
      <div class="cn">${item.name}</div>
      <div class="cc">${item.label}</div>
    `;
    grid.appendChild(card);
  });
}
