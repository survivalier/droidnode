// ── Initialisation ────────────────────────────────────────
function initSvgEditor(winId, meta={}){
  const state = {
    filename: meta.path ? meta.path.split('/').pop() : 'nouveau.svg',
    path: meta.path || null,
    zoom: 1,
    view: 'split',
    dirty: false,
    monacoReady: false,
  };
  svgEdState[winId] = state;

  // Init Monaco pour SVG
  require(['vs/editor/editor.main'], function(){
    const container = document.getElementById('svg-monaco-'+winId);
    if(!container) return;

    // Définir un langage SVG/XML si pas déjà fait
    const editor = monaco.editor.create(container, {
      value: SVG_TEMPLATES.blank,
      language: 'xml',
      theme: 'vs-dark',
      automaticLayout: true,
      fontSize: 13,
      fontFamily: "'Fira Code','Cascadia Code','Courier New',monospace",
      fontLigatures: true,
      minimap: { enabled: false },
      wordWrap: 'on',
      lineNumbers: 'on',
      folding: true,
      bracketPairColorization: { enabled: true },
      scrollBeyondLastLine: false,
      padding: { top: 8 },
    });

    monacoInstances[winId] = editor;
    state.monacoReady = true;

    // Live preview à chaque changement
    editor.onDidChangeModelContent(()=>{
      state.dirty = true;
      svgMarkDirty(winId);
      svgUpdatePreview(winId);
    });

    // Ctrl+S
    editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, ()=> svgSave(winId));

    // Charger le fichier si passé en meta
    if(meta.path){
      svgLoadFile(winId, meta.path);
    } else {
      svgUpdatePreview(winId);
      svgUpdateProps(winId);
    }
  });
}

// ── Preview ───────────────────────────────────────────────
function svgUpdatePreview(winId){
  const editor = monacoInstances[winId]; if(!editor) return;
  const code = editor.getValue();
  const canvas = document.getElementById('svg-canvas-'+winId);
  if(!canvas) return;

  const state = svgEdState[winId]||{zoom:1};

  // Injecter le SVG dans l'aperçu
  canvas.innerHTML = code;
  const svg = canvas.querySelector('svg');
  if(svg){
    svg.style.transform = `scale(${state.zoom||1})`;
    svg.style.transformOrigin = 'center center';
    svg.style.maxWidth = '100%';
    svg.style.maxHeight = '100%';

    // Lire dimensions
    const w = svg.getAttribute('width')||svg.viewBox?.baseVal?.width||'?';
    const h = svg.getAttribute('height')||svg.viewBox?.baseVal?.height||'?';
    const dimsEl = document.getElementById('svg-dims-'+winId);
    if(dimsEl) dimsEl.textContent = `${w} × ${h}`;

    // Mettre à jour le panneau props
    const vb = svg.getAttribute('viewBox')||'';
    const wIn = document.getElementById('svgp-w-'+winId);
    const hIn = document.getElementById('svgp-h-'+winId);
    const vbIn = document.getElementById('svgp-vb-'+winId);
    if(wIn&&!document.activeElement.id.includes('svgp-w')) wIn.value = svg.getAttribute('width')||'';
    if(hIn&&!document.activeElement.id.includes('svgp-h')) hIn.value = svg.getAttribute('height')||'';
    if(vbIn&&!document.activeElement.id.includes('svgp-vb')) vbIn.value = vb;

    // Infos
    const infoEl = document.getElementById('svg-info-'+winId);
    if(infoEl){
      const bytes = new Blob([code]).size;
      const elCount = (code.match(/<[a-z]/gi)||[]).length;
      infoEl.innerHTML = `Taille : ${bytes < 1024 ? bytes+' o' : (bytes/1024).toFixed(1)+' Ko'}<br>Éléments : ${elCount}<br>Lignes : ${code.split('\n').length}`;
    }

    // Status
    const st = document.getElementById('svg-status-'+winId);
    if(st) st.textContent = `SVG valide · ${new Blob([code]).size} octets`;
  } else {
    const st = document.getElementById('svg-status-'+winId);
    if(st) st.textContent = '⚠ SVG invalide ou vide';
  }
}

// ── Dirty ─────────────────────────────────────────────────
function svgMarkDirty(winId){
  const st = svgEdState[winId]; if(!st) return;
  const el = document.getElementById('svg-dirty-'+winId);
  if(el) el.style.display = st.dirty ? 'inline' : 'none';
  updatePreviews();
}

// ── Vues ─────────────────────────────────────────────────
function svgSetView(winId, view){
  svgEdState[winId].view = view;
  const code = document.getElementById('svg-codepane-'+winId);
  const prev = document.getElementById('svg-prevpane-'+winId);
  const shp  = document.getElementById('svg-shapes-'+winId);
  const prp  = document.getElementById('svg-props-'+winId);

  ['split','code','preview'].forEach(v=>{
    const btn = document.getElementById(`svgbtn-${v}-${winId}`);
    if(btn) btn.classList.toggle('active', v===view);
  });

  if(view==='split'){
    code.style.display='flex'; prev.style.display='flex';
    shp.style.display='flex'; prp.style.display='flex';
  } else if(view==='code'){
    code.style.display='flex'; prev.style.display='none';
    shp.style.display='flex'; prp.style.display='none';
  } else {
    code.style.display='none'; prev.style.display='flex';
    shp.style.display='none'; prp.style.display='none';
  }
  // Re-layout Monaco
  const ed = monacoInstances[winId];
  if(ed) setTimeout(()=>ed.layout(), 50);
}

// ── Zoom aperçu ───────────────────────────────────────────
function svgZoom(winId, factor){
  const st = svgEdState[winId]; if(!st) return;
  st.zoom = Math.max(0.1, Math.min((st.zoom||1)*factor, 8));
  const lbl = document.getElementById('svg-zoom-label-'+winId);
  if(lbl) lbl.textContent = Math.round(st.zoom*100)+'%';
  svgUpdatePreview(winId);
}
function svgZoomFit(winId){
  const st = svgEdState[winId]; if(!st) return;
  st.zoom = 1;
  const lbl = document.getElementById('svg-zoom-label-'+winId);
  if(lbl) lbl.textContent = '100%';
  svgUpdatePreview(winId);
}

// ── Templates ─────────────────────────────────────────────
function svgLoadTemplate(winId){
  const sel = document.getElementById('svg-tpl-'+winId);
  if(!sel||!sel.value) return;
  const tpl = SVG_TEMPLATES[sel.value];
  if(!tpl) return;
  if(svgEdState[winId]?.dirty && !confirm('Charger le modèle ? Les modifications non sauvegardées seront perdues.')) return;
  const ed = monacoInstances[winId];
  if(ed){ ed.setValue(tpl); svgEdState[winId].dirty=false; svgMarkDirty(winId); }
  sel.value = '';
}

// ── Snippets ──────────────────────────────────────────────
function svgInsertSnippet(winId, name){
  const snip = SVG_SNIPPETS.find(s=>s.label===name);
  if(!snip) return;
  const ed = monacoInstances[winId]; if(!ed) return;
  const pos = ed.getPosition();
  ed.executeEdits('insert-snippet', [{
    range: new monaco.Range(pos.lineNumber, pos.column, pos.lineNumber, pos.column),
    text: '\n  ' + snip.code + '\n'
  }]);
  ed.focus();
}

// ── Couleur rapide ────────────────────────────────────────
function svgInsertColor(winId, color){
  const ed = monacoInstances[winId]; if(!ed) return;
  const sel = ed.getSelection();
  ed.executeEdits('insert-color', [{range: sel, text: color}]);
  ed.focus();
}

// ── Mise à jour attribut SVG racine via panneau props ─────
function svgUpdateAttr(winId, attr, value){
  const ed = monacoInstances[winId]; if(!ed) return;
  const code = ed.getValue();
  const updated = code.replace(
    /(<svg[^>]*)\s+attr="[^"]*"/,
    `$1 ${attr}="${value}"`
  );
  // Regex plus générique
  const re = new RegExp(`(<svg[^>]*\\s${attr}=")[^"]*(")`);
  const newCode = re.test(code)
    ? code.replace(re, `$1${value}$2`)
    : code.replace(/(<svg)/, `$1 ${attr}="${value}"`);
  if(newCode !== code){
    ed.setValue(newCode);
  }
}

// ── Formatage / minification ──────────────────────────────
function svgFormat(winId){
  const ed = monacoInstances[winId]; if(!ed) return;
  ed.getAction('editor.action.formatDocument').run().then(()=>toast('SVG formaté'));
}

function svgMinify(winId){
  const ed = monacoInstances[winId]; if(!ed) return;
  let code = ed.getValue();
  // Supprimer commentaires, espaces superflus entre tags
  code = code.replace(/<!--[\s\S]*?-->/g,'');
  code = code.replace(/>\s+</g,'><');
  code = code.replace(/\s{2,}/g,' ');
  code = code.trim();
  ed.setValue(code);
  toast('SVG minifié : '+new Blob([code]).size+' octets');
}

// ── Copier ────────────────────────────────────────────────
function svgCopyCode(winId){
  const ed = monacoInstances[winId]; if(!ed) return;
  navigator.clipboard.writeText(ed.getValue()).then(()=>toast('SVG copié !'));
}

function svgCopyURI(winId){
  const ed = monacoInstances[winId]; if(!ed) return;
  const b64 = btoa(unescape(encodeURIComponent(ed.getValue())));
  const uri = `data:image/svg+xml;base64,${b64}`;
  navigator.clipboard.writeText(uri).then(()=>toast('data:URI copié !'));
}

// ── Nouveau ───────────────────────────────────────────────
function svgNew(winId){
  const st = svgEdState[winId]; if(!st) return;
  if(st.dirty && !confirm('Nouveau fichier ? Les modifications seront perdues.')) return;
  const ed = monacoInstances[winId]; if(!ed) return;
  ed.setValue(SVG_TEMPLATES.blank);
  st.path = null; st.dirty = false;
  st.filename = 'nouveau.svg';
  const fn = document.getElementById('svg-fname-'+winId);
  if(fn) fn.textContent = 'nouveau.svg';
  const wtitle = document.getElementById('wtitle-'+winId);
  if(wtitle) wtitle.textContent = 'Éditeur SVG – nouveau.svg';
  svgMarkDirty(winId);
}

// ── Ouvrir depuis explorateur ─────────────────────────────
function svgOpenPicker(winId){
  // Ouvrir l'explorateur et attendre un clic sur un .svg
  toast('Double-cliquez sur un fichier .svg dans l\'explorateur');
  openNewWindow('explorer');
}

function openInSvgEditor(path){
  const existing = Object.entries(wins).find(([id,w])=>w.type==='svged');
  if(existing){
    const [winId,w] = existing;
    if(w.minimized){ w.minimized=false; w.el.classList.remove('minimized'); }
    focusWin(winId);
    svgLoadFile(winId, path);
  } else {
    openNewWindow('svged', {path});
  }
}

async function svgLoadFile(winId, path){
  setCursorLoading();
  try{
    const r = await fetch(`/api/read?path=${encodeURIComponent(path)}`);
    const d = await r.json();
    if(d.error){ toast('Erreur : '+d.error); return; }
    const ed = monacoInstances[winId]; if(!ed) return;
    const st = svgEdState[winId]; if(!st) return;
    ed.setValue(d.content||'');
    st.path = path; st.dirty = false;
    st.filename = path.split('/').pop();
    const fn = document.getElementById('svg-fname-'+winId);
    if(fn) fn.textContent = st.filename;
    const wtitle = document.getElementById('wtitle-'+winId);
    if(wtitle) wtitle.textContent = 'Éditeur SVG – '+st.filename;
    svgMarkDirty(winId);
    updatePreviews();
  } finally{ clearCursorLoading(); }
}

// ── Sauvegarder ───────────────────────────────────────────
async function svgSave(winId){
  const st = svgEdState[winId]; if(!st) return;
  if(!st.path) return svgSaveAs(winId);
  const ed = monacoInstances[winId]; if(!ed) return;
  setCursorLoading();
  try{
    const r = await fetch('/api/write',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({path:st.path, content:ed.getValue()})
    });
    const res = await r.json();
    if(res.ok){
      st.dirty = false; svgMarkDirty(winId);
      toast('SVG sauvegardé : '+st.filename);
    } else { toast('Erreur : '+res.error); }
  } finally{ clearCursorLoading(); }
}

async function svgSaveAs(winId){
  const name = prompt('Nom du fichier SVG :', svgEdState[winId]?.filename||'nouveau.svg');
  if(!name) return;
  const path = name.startsWith('/') ? name : (currentPath==='/'?'/':currentPath)+'/'+name;
  if(svgEdState[winId]) svgEdState[winId].path = path;
  if(svgEdState[winId]) svgEdState[winId].filename = name.split('/').pop();
  const fn = document.getElementById('svg-fname-'+winId);
  if(fn) fn.textContent = svgEdState[winId].filename;
  const wtitle = document.getElementById('wtitle-'+winId);
  if(wtitle) wtitle.textContent = 'Éditeur SVG – '+svgEdState[winId].filename;
  await svgSave(winId);
}

// ── Télécharger ───────────────────────────────────────────
function svgDownload(winId){
  const ed = monacoInstances[winId]; if(!ed) return;
  const st = svgEdState[winId]||{};
  const blob = new Blob([ed.getValue()], {type:'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = st.filename||'export.svg';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

// ── Export PNG ────────────────────────────────────────────
function svgExportPNG(winId){
  const canvas = document.getElementById('svg-canvas-'+winId);
  if(!canvas) return;
  const svgEl = canvas.querySelector('svg');
  if(!svgEl){ toast('Aucun SVG valide à exporter.'); return; }

  const serializer = new XMLSerializer();
  const svgStr = serializer.serializeToString(svgEl);
  const w = svgEl.width?.baseVal?.value || svgEl.viewBox?.baseVal?.width || 400;
  const h = svgEl.height?.baseVal?.value || svgEl.viewBox?.baseVal?.height || 300;

  const img = new Image();
  const blob = new Blob([svgStr], {type:'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  img.onload = ()=>{
    const cv = document.createElement('canvas');
    cv.width = w*2; cv.height = h*2; // 2x pour la qualité
    const ctx = cv.getContext('2d');
    ctx.scale(2,2);
    ctx.drawImage(img, 0, 0, w, h);
    URL.revokeObjectURL(url);
    cv.toBlob(pngBlob=>{
      const a = document.createElement('a');
      a.href = URL.createObjectURL(pngBlob);
      const st = svgEdState[winId]||{};
      a.download = (st.filename||'export').replace(/\.svg$/i,'')+'.png';
      document.body.appendChild(a); a.click();
      document.body.removeChild(a);
      toast('PNG exporté (2x)');
    },'image/png');
  };
  img.src = url;
}

// ── Mise à jour props depuis panneau ─────────────────────
function svgUpdateProps(winId){
  const ed = monacoInstances[winId]; if(!ed) return;
  svgUpdatePreview(winId);
}

const mediaState = {};

function buildMediaHTML(id){
  return `
  <div class="mp-wrap" id="mpwrap-${id}">
    <div class="mp-screen" id="mpscreen-${id}">
      <div class="mp-cover" id="mpcover-${id}">
        <i class="fa-solid fa-circle-play"></i>
        <div class="mp-cover-title" id="mptitle-cover-${id}">Ouvrez un fichier audio ou vidéo</div>
      </div>
      <video id="mpvideo-${id}" style="display:none;width:100%;height:100%;object-fit:contain;"></video>
    </div>
    <div class="mp-controls" id="mpctrl-${id}">
      <div class="mp-progress-wrap">
        <span id="mptime-${id}">0:00</span>
        <input type="range" class="mp-progress" id="mpprog-${id}" min="0" max="100" value="0" step="0.1">
        <span id="mpdur-${id}">0:00</span>
      </div>
      <div class="mp-btns">
        <button class="mp-btn" id="mpshuffle-${id}" onclick="mpShuffle('${id}')" title="Aléatoire"><i class="fa-solid fa-shuffle"></i></button>
        <button class="mp-btn" onclick="mpPrev('${id}')" title="Précédent"><i class="fa-solid fa-backward-step"></i></button>
        <button class="mp-btn play" id="mpplay-${id}" onclick="mpToggle('${id}')"><i class="fa-solid fa-play"></i></button>
        <button class="mp-btn" onclick="mpNext('${id}')" title="Suivant"><i class="fa-solid fa-forward-step"></i></button>
        <button class="mp-btn" id="mprepeat-${id}" onclick="mpRepeat('${id}')" title="Répéter"><i class="fa-solid fa-repeat"></i></button>
        <span class="mp-title" id="mptitle-${id}">—</span>
        <button class="mp-btn" onclick="mpMute('${id}')" id="mpmute-${id}" title="Muet"><i class="fa-solid fa-volume-high"></i></button>
        <input type="range" class="mp-vol" id="mpvol-${id}" min="0" max="1" step="0.02" value="1">
        <button class="mp-btn" onclick="mpOpenFile('${id}')" title="Ouvrir fichier"><i class="fa-solid fa-folder-open"></i></button>
      </div>
    </div>
    <div class="mp-playlist" id="mplist-${id}"></div>
  </div>`;
}

function initMedia(winId, meta={}){
  mediaState[winId] = { playlist:[], current:0, shuffle:false, repeat:'none', audio:null };
  const video = document.getElementById('mpvideo-'+winId);
  if(!video) return;

  // Progress bar
  const prog = document.getElementById('mpprog-'+winId);
  video.addEventListener('timeupdate', ()=>{
    if(!video.duration) return;
    prog.value = (video.currentTime/video.duration)*100;
    document.getElementById('mptime-'+winId).textContent = fmtTime(video.currentTime);
  });
  video.addEventListener('loadedmetadata', ()=>{
    document.getElementById('mpdur-'+winId).textContent = fmtTime(video.duration);
    prog.max = 100;
  });
  video.addEventListener('ended', ()=> mpEnded(winId));
  prog.addEventListener('input', ()=>{ if(video.duration) video.currentTime=(prog.value/100)*video.duration; });

  // Volume
  const vol = document.getElementById('mpvol-'+winId);
  vol.addEventListener('input', ()=>{ video.volume=vol.value; updateMuteBtn(winId); });

  // Update play btn on play/pause
  video.addEventListener('play',  ()=> document.getElementById('mpplay-'+winId).innerHTML='<i class="fa-solid fa-pause"></i>');
  video.addEventListener('pause', ()=> document.getElementById('mpplay-'+winId).innerHTML='<i class="fa-solid fa-play"></i>');

  if(meta.path) mpLoadFile(winId, meta.path);
}

function fmtTime(s){
  if(isNaN(s)||!isFinite(s)) return '0:00';
  const m=Math.floor(s/60), ss=Math.floor(s%60);
  return m+':'+(ss<10?'0':'')+ss;
}

function mpGetVideo(winId){ return document.getElementById('mpvideo-'+winId); }

async function mpLoadFile(winId, path, autoPlay=true){
  setCursorLoading();
  setTimeout(clearCursorLoading, 800); // média → pas de await, délai fixe
  const st=mediaState[winId]; if(!st) return;
  const name=path.split('/').pop();
  const ext=name.toLowerCase().split('.').pop();
  const isVid=VIDEO_EXTS.has(ext);
  const url=`/api/download?path=${encodeURIComponent(path)}`;

  const video=mpGetVideo(winId);
  const cover=document.getElementById('mpcover-'+winId);

  video.src=url;
  video.style.display= isVid?'block':'none';
  if(cover) cover.style.display= isVid?'none':'flex';

  // Update cover title for audio
  const ct=document.getElementById('mptitle-cover-'+winId);
  if(ct&&!isVid){ ct.textContent=name; ct.previousElementSibling.className='fa-solid fa-music'; }

  document.getElementById('mptitle-'+winId).textContent=name;
  const wtitle=document.getElementById('wtitle-'+winId);
  if(wtitle) wtitle.textContent='Lecteur – '+name;

  // Find in playlist, add if missing
  let idx=st.playlist.findIndex(i=>i.path===path);
  if(idx===-1){ st.playlist.push({path,name}); idx=st.playlist.length-1; }
  st.current=idx;
  rebuildPlaylist(winId);
  updatePreviews();

  if(autoPlay) video.play().catch(()=>{});
}

function mpToggle(winId){
  const v=mpGetVideo(winId); if(!v||!v.src) return;
  v.paused ? v.play() : v.pause();
}

function mpPrev(winId){
  const st=mediaState[winId]; if(!st||!st.playlist.length) return;
  const v=mpGetVideo(winId);
  if(v&&v.currentTime>3){ v.currentTime=0; return; }
  st.current=(st.current-1+st.playlist.length)%st.playlist.length;
  mpLoadFile(winId, st.playlist[st.current].path);
}

function mpNext(winId){
  const st=mediaState[winId]; if(!st||!st.playlist.length) return;
  if(st.shuffle){
    let r; do{ r=Math.floor(Math.random()*st.playlist.length); }while(r===st.current&&st.playlist.length>1);
    st.current=r;
  } else {
    st.current=(st.current+1)%st.playlist.length;
  }
  mpLoadFile(winId, st.playlist[st.current].path);
}

function mpEnded(winId){
  const st=mediaState[winId]; if(!st) return;
  if(st.repeat==='one'){ const v=mpGetVideo(winId); if(v){v.currentTime=0;v.play();} return; }
  if(st.repeat==='all'||st.current<st.playlist.length-1||st.shuffle) mpNext(winId);
}

function mpShuffle(winId){
  const st=mediaState[winId]; if(!st) return;
  st.shuffle=!st.shuffle;
  const btn=document.getElementById('mpshuffle-'+winId);
  if(btn) btn.classList.toggle('active',st.shuffle);
}

function mpRepeat(winId){
  const st=mediaState[winId]; if(!st) return;
  const modes=['none','all','one'];
  st.repeat=modes[(modes.indexOf(st.repeat)+1)%3];
  const btn=document.getElementById('mprepeat-'+winId);
  if(!btn) return;
  btn.classList.toggle('active',st.repeat!=='none');
  btn.title = st.repeat==='one'?'Répéter 1':st.repeat==='all'?'Répéter tout':'Répéter';
  btn.innerHTML = st.repeat==='one'?'<i class="fa-solid fa-1"></i>':'<i class="fa-solid fa-repeat"></i>';
}

function mpMute(winId){
  const v=mpGetVideo(winId); if(!v) return;
  v.muted=!v.muted;
  updateMuteBtn(winId);
}

function updateMuteBtn(winId){
  const v=mpGetVideo(winId); if(!v) return;
  const btn=document.getElementById('mpmute-'+winId); if(!btn) return;
  const icon = v.muted||v.volume===0 ? 'fa-volume-xmark' : v.volume<0.5 ? 'fa-volume-low' : 'fa-volume-high';
  btn.innerHTML=`<i class="fa-solid ${icon}"></i>`;
}

function mpOpenFile(winId){
  // Browse current explorer path for media
  const input=document.createElement('input');
  input.type='file';
  input.accept='audio/*,video/*';
  input.multiple=true;
  input.onchange=()=>{
    Array.from(input.files).forEach((file,i)=>{
      const url=URL.createObjectURL(file);
      const st=mediaState[winId]; if(!st) return;
      st.playlist.push({path:null,name:file.name,blobUrl:url});
      if(i===0){ st.current=st.playlist.length-1; mpLoadBlob(winId,url,file.name); }
      else rebuildPlaylist(winId);
    });
  };
  input.click();
}

function mpLoadBlob(winId, url, name){
  const ext=name.toLowerCase().split('.').pop();
  const isVid=VIDEO_EXTS.has(ext);
  const video=mpGetVideo(winId);
  const cover=document.getElementById('mpcover-'+winId);
  video.src=url;
  video.style.display=isVid?'block':'none';
  if(cover) cover.style.display=isVid?'none':'flex';
  const ct=document.getElementById('mptitle-cover-'+winId);
  if(ct&&!isVid){ ct.textContent=name; ct.previousElementSibling.className='fa-solid fa-music'; }
  document.getElementById('mptitle-'+winId).textContent=name;
  const wtitle=document.getElementById('wtitle-'+winId);
  if(wtitle) wtitle.textContent='Lecteur – '+name;
  rebuildPlaylist(winId);
  updatePreviews();
  video.play().catch(()=>{});
}

function rebuildPlaylist(winId){
  const st=mediaState[winId]; if(!st) return;
  const el=document.getElementById('mplist-'+winId); if(!el) return;
  el.innerHTML='';
  if(st.playlist.length===0) return;
  st.playlist.forEach((item,i)=>{
    const div=document.createElement('div');
    div.className='mp-pl-item'+(i===st.current?' playing':'');
    const ext=item.name.toLowerCase().split('.').pop();
    const isVid=VIDEO_EXTS.has(ext);
    div.innerHTML=`<i class="fa-solid fa-${i===st.current?'circle-play':isVid?'file-video':'file-audio'}"></i><span class="mp-pl-name" title="${esc(item.name)}">${esc(item.name)}</span>`;
    div.ondblclick=()=>{
      st.current=i;
      if(item.blobUrl) mpLoadBlob(winId,item.blobUrl,item.name);
      else mpLoadFile(winId,item.path);
    };
    // Remove from playlist on middle-click
    div.onauxclick=e=>{ if(e.button===1){ st.playlist.splice(i,1); if(st.current>=st.playlist.length) st.current=Math.max(0,st.playlist.length-1); rebuildPlaylist(winId); } };
    el.appendChild(div);
  });
}

// Open file from explorer in the best/existing media window
function openInMediaPlayer(path){
  const existing=Object.entries(wins).find(([id,w])=>w.type==='media');
  if(existing){
    const [winId,w]=existing;
    if(w.minimized){w.minimized=false;w.el.classList.remove('minimized');}
    focusWin(winId);
    mpLoadFile(winId,path);
  } else {
    openNewWindow('media',{path});
  }
}

const diskCache = {};   // winId → dernières données

function fmtBytes(b){
  if(b == null) return '—';
  if(b < 1024)             return b + ' o';
  if(b < 1024*1024)        return (b/1024).toFixed(1) + ' Ko';
  if(b < 1024*1024*1024)   return (b/(1024*1024)).toFixed(1) + ' Mo';
  return (b/(1024*1024*1024)).toFixed(2) + ' Go';
}

function diskBarColor(pct){
  if(pct >= 90) return '#ef4444';
  if(pct >= 75) return '#f97316';
  if(pct >= 50) return '#facc15';
  return '#4ade80';
}

async function loadDiskWidget(winId){
  try{
    setCursorLoading();
    const r = await fetch('/api/disk');
    if(!r.ok) return;
    const d = await r.json();
    if(d.error) return;
    diskCache[winId] = d;
    renderDiskWidget(winId, d);
  }catch(e){} finally{ clearCursorLoading(); }
}

function renderDiskWidget(winId, d){
  const bar   = document.getElementById('dw-bar-'+winId);
  const used  = document.getElementById('dw-used-'+winId);
  const total = document.getElementById('dw-total-'+winId);
  if(!bar) return;
  const pct   = d.pct || 0;
  const color = diskBarColor(pct);
  bar.style.width      = Math.min(pct, 100)+'%';
  bar.style.background = color;
  if(used)  used.textContent  = fmtBytes(d.used) + ' utilisé';
  if(total) total.textContent = fmtBytes(d.total);
  // Couleur de la bordure si critique
  const widget = document.getElementById('dw-'+winId);
  if(widget) widget.style.borderColor = pct >= 90 ? 'rgba(239,68,68,.5)' : '';
}

function showDiskDetail(event, winId){
  event.stopPropagation();
  const d = diskCache[winId];
  const popup = document.getElementById('disk-popup-detail');
  const content = document.getElementById('disk-popup-content');
  if(!d || !popup || !content) return;

  const pct   = d.pct || 0;
  const color = diskBarColor(pct);

  // Barre principale
  let html = `
    <div class="dp-bar-big">
      <div class="dp-bar-big-fill" style="width:${Math.min(pct,100)}%;background:${color};"></div>
    </div>
    <div style="text-align:center;font-size:.78rem;color:var(--muted);margin-bottom:12px;">${pct}% utilisé</div>
    <div class="dp-row"><span class="dp-label"><i class="fa-solid fa-circle-dot" style="color:${color};"></i> Utilisé</span><span class="dp-val">${fmtBytes(d.used)}</span></div>
    <div class="dp-row"><span class="dp-label"><i class="fa-solid fa-circle-dot" style="color:rgba(255,255,255,.2);"></i> Libre</span><span class="dp-val" style="color:#4ade80;">${fmtBytes(d.free)}</span></div>
    <div class="dp-row"><span class="dp-label"><i class="fa-solid fa-hdd"></i> Total</span><span class="dp-val">${fmtBytes(d.total)}</span></div>
  `;

  // Partitions supplémentaires
  if(d.partitions && d.partitions.length){
    html += '<div class="dp-part"><div class="dp-part-title">Partitions</div>';
    d.partitions.forEach(p => {
      const usedKb  = p.used_kb  != null ? fmtBytes(p.used_kb  * 1024) : '—';
      const freeKb  = p.free_kb  != null ? fmtBytes(p.free_kb  * 1024) : '—';
      const totalKb = p.total_kb != null ? fmtBytes(p.total_kb * 1024) : '—';
      const mp      = p.mountpoint || p.filesystem || '?';
      const pPct    = p.use_pct || '—';
      html += `
        <div class="dp-row" style="flex-direction:column;align-items:flex-start;gap:4px;">
          <div style="font-size:.78rem;font-weight:500;color:var(--accent);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;">${esc(mp)}</div>
          <div style="display:flex;justify-content:space-between;width:100%;font-size:.76rem;color:var(--muted);">
            <span>Utilisé : ${usedKb}</span>
            <span>Libre : ${freeKb}</span>
            <span>Total : ${totalKb}</span>
            <span>${pPct}</span>
          </div>
        </div>`;
    });
    html += '</div>';
  }

  content.innerHTML = html;

  // Positionner le popup près du widget cliqué
  const rect = event.currentTarget.getBoundingClientRect
    ? event.currentTarget.getBoundingClientRect()
    : {top: event.clientY, left: event.clientX, width: 0};
  popup.classList.add('visible');
  const pw = popup.offsetWidth  || 340;
  const ph = popup.offsetHeight || 300;
  const margin = 8;
  let x = rect.left;
  let y = rect.top - ph - margin;
  // Si ça dépasse en haut, mettre en dessous
  if(y < margin) y = rect.bottom + margin;
  // Clamp horizontal
  x = Math.max(margin, Math.min(x, window.innerWidth - pw - margin));
  popup.style.left = x + 'px';
  popup.style.top  = y + 'px';
}

// Fermer le popup disque en cliquant ailleurs
document.addEventListener('click', e => {
  const p = document.getElementById('disk-popup-detail');
  if(p && p.classList.contains('visible') && !p.contains(e.target)){
    p.classList.remove('visible');
  }
});
